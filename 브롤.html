// 하이스트 금고 위치 (상수처럼 사용)
const HEIST_ALLY_VAULT  = { x: 2*TS,       y: MY*TS/2 };
const HEIST_ENEMY_VAULT = { x: (MX-2)*TS,  y: MY*TS/2 };

// 하이스트: 업데이트(충돌/승패)만 담당
function updateHeist(dt) {
  if (!heistHp) return;
  for (const b of bullets) {
    if (!b.alive) continue;
    if (b.owner==='player'||b.owner==='ally') {
      if (Math.hypot(b.x-HEIST_ENEMY_VAULT.x, b.y-HEIST_ENEMY_VAULT.y)<30) {
        heistHp.enemy -= b.dmg;
        b.alive=false;
        spawnParts(HEIST_ENEMY_VAULT.x, HEIST_ENEMY_VAULT.y, '#ff4444', 3);
        if (b.owner==='player') { chargePlayerSuper(b.isSuper); SFX.hit(); } // 금고 공격 시 슈퍼 충전 + 소리
      }
    } else if (b.owner==='enemy') {
      if (Math.hypot(b.x-HEIST_ALLY_VAULT.x, b.y-HEIST_ALLY_VAULT.y)<30) {
        heistHp.ally -= b.dmg;
        b.alive=false;
        spawnParts(HEIST_ALLY_VAULT.x, HEIST_ALLY_VAULT.y, '#4444ff', 3);
        SFX.hit(); // 아군 금고 피격 소리
      }
    }
  }
  if (heistHp.enemy<=0) { endGame(true); return; }
  if (heistHp.ally<=0)  { endGame(false); return; }
}

// 하이스트: 그리기만 담당 (clearRect 이후 호출)
function drawHeist() {
  if (!heistHp) return;
  const vaultDraw = (vx,vy,hp,max,col) => {
    const sx=vx-cam.x, sy=vy-cam.y;
    ctx.save();
    ctx.font='28px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🏦', sx, sy);
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(sx-22,sy-32,44,7);
    ctx.fillStyle=col; ctx.fillRect(sx-22,sy-32,44*(hp/max),7);
    ctx.restore();
  };
  vaultDraw(HEIST_ALLY_VAULT.x,  HEIST_ALLY_VAULT.y,  heistHp.ally,  20000,'#44aaff');
  vaultDraw(HEIST_ENEMY_VAULT.x, HEIST_ENEMY_VAULT.y, heistHp.enemy, 20000,'#ff4444');
}

// 브롤볼: 공을 적 골대에 넣기
function updateBrawlBall(dt) {
  if (!brawlBall) return;
  const ball = brawlBall;
  const goalL = { x: TS*1.5, y: MY*TS/2, r:30 };
  const goalR = { x: (MX-1.5)*TS, y: MY*TS/2, r:30 };

  if (!ball.holder) {
    const prevX = ball.x, prevY = ball.y;
    ball.x += ball.vx; ball.y += ball.vy;
    ball.vx *= 0.95; ball.vy *= 0.95;
    if (solid(ball.x, ball.y)) {
      // X축만 되돌리기
      if (!solid(prevX, ball.y)) {
        ball.x = prevX; ball.vx *= -0.7;
      // Y축만 되돌리기
      } else if (!solid(ball.x, prevY)) {
        ball.y = prevY; ball.vy *= -0.7;
      // 양쪽 막힘: 완전히 이전 위치로
      } else {
        ball.x = prevX; ball.y = prevY;
        ball.vx *= -0.7; ball.vy *= -0.7;
      }
    }
    // 벽에 완전히 갇혔을 때(속도 0에 가까움) 중앙으로 리셋
    if (solid(ball.x, ball.y)) {
      ball.x = MX*TS/2; ball.y = MY*TS/2;
      ball.vx = 0; ball.vy = 0;
    }
    // 줍기
    const allE = [player, ...bots].filter(e=>e&&e.alive);
    for (const e of allE) {
      if (Math.hypot(e.x-ball.x, e.y-ball.y)<25) { ball.holder=e; break; }
    }
  } else {
    const h = ball.holder;
    if (!h.alive) { ball.holder=null; ball.vx=(Math.random()-0.5)*4; ball.vy=(Math.random()-0.5)*4; return; }
    ball.x=h.x; ball.y=h.y;
    // 공 가진 상태에서 이동 시 상대팀과 충돌하면 공 떨굼
    const foes = [player,...bots].filter(e=>e&&e.alive&&e!==h&&e.team!==h.team&&!(h.team==='player'&&e.team==='ally')&&!(h===player&&e.team==='ally'));
    for (const f of foes) {
      if (Math.hypot(f.x-h.x,f.y-h.y)<28) {
        ball.holder=null;
        ball.vx=Math.cos(Math.atan2(h.y-f.y,h.x-f.x))*5;
        ball.vy=Math.sin(Math.atan2(h.y-f.y,h.x-f.x))*5;
        break;
      }
    }
  }
  // 골 체크
  if (Math.hypot(ball.x-goalR.x,ball.y-goalR.y)<goalR.r) {
    score+=5; endGame(true); return;
  }
  if (Math.hypot(ball.x-goalL.x,ball.y-goalL.y)<goalL.r) {
    endGame(false); return;
  }
}
function drawBrawlBall() {
  if (!brawlBall) return;
  const ball = brawlBall;
  const goalL = { x: TS*1.5,      y: MY*TS/2, r:30 };
  const goalR = { x: (MX-1.5)*TS, y: MY*TS/2, r:30 };
  // 골대 그리기
  [[goalL,'#44aaff'],[goalR,'#ff4444']].forEach(([g,c])=>{
    const gx=g.x-cam.x, gy=g.y-cam.y;
    ctx.save(); ctx.strokeStyle=c; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(gx,gy,g.r,0,Math.PI*2); ctx.stroke();
    ctx.font='24px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🥅',gx,gy); ctx.restore();
  });
  // 공 그리기 (흰색 + 검정 패턴)
  const bx = ball.holder ? ball.holder.x : ball.x;
  const by = ball.holder ? ball.holder.y - 20 : ball.y;
  const sx = bx - cam.x, sy = by - cam.y;
  const R = 10;
  ctx.save();
  // 흰 원
  ctx.beginPath(); ctx.arc(sx, sy, R, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff'; ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.stroke();
  // 검정 오각형 패턴
  ctx.fillStyle = '#111';
  const drawPatch = (cx, cy, r) => {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = Math.PI*2/5*i - Math.PI/2;
      i===0 ? ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r)
             : ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
  };
  drawPatch(sx, sy, 3.2); // 중앙
  for (let i = 0; i < 5; i++) {
    const a = Math.PI*2/5*i - Math.PI/2;
    drawPatch(sx + Math.cos(a)*6.5, sy + Math.sin(a)*6.5, 2.0);
  }
  ctx.restore();
}

// IKE 기지 위치 상수
const SIEGE_ALLY_IKE  = { x: 2*TS, y: Math.floor(15/2)*TS };
const SIEGE_ENEMY_IKE = { x: (20-2)*TS, y: Math.floor(15/2)*TS };
const SIEGE_IKE_MAX_HP = 40000;

function spawnSiegeBot(team) {
  const isAlly = team === 'ally';
  const sp = safeSpawn(isAlly ? 'left' : 'right');
  const bot = makeEntity(sp.x, sp.y, 'frank', team);
  bot.hp = bot.maxHp = 25000;
  bot.d = Object.assign({}, bot.d, {
    ico: '🤖', name: isAlly ? '아군 시즈봇' : '적 시즈봇',
    spd: 2.2, dmg: 1400, range: 160, color: isAlly ? '#ffe100' : '#ff4444'
  });
  bot._siege = true;
  bot._siegeTeam = team;
  bots.push(bot);
  spawnParts(sp.x, sp.y, isAlly ? '#ffe100' : '#ff4444', 25);
  SFX.superActivate();
  return bot;
}

function updateSiege(dt) {
  if (!siegeIke) return;
  siegeTimer -= dt;

  // 볼트 스폰 (맵 중앙)
  if (Math.random() < dt * 0.6) {
    const tx2 = 7 + (Math.random()*6|0), ty2 = 4 + (Math.random()*7|0);
    if (map[ty2] && map[ty2][tx2] === 0)
      gems.push({ x: tx2*TS+TS/2, y: ty2*TS+TS/2, alive: true, bob: 0, isBolt: true });
  }
  updateGems(dt);

  // 아군 볼트 10개 → 로봇 소환
  siegeBolts.ally = (player ? player.gems : 0) + bots.filter(b => b.team==='ally').reduce((s,b) => s+b.gems, 0);
  if (siegeBolts.ally >= 10 && !siegeBot) {
    if (player) player.gems = 0;
    bots.filter(b => b.team==='ally').forEach(b => b.gems = 0);
    siegeBolts.ally = 0; gems = [];
    siegeBot = spawnSiegeBot('ally');
  }
  if (siegeBot && !siegeBot.alive) siegeBot = null;

  // 적 볼트: 적 봇들의 gem 합계로 계산
  siegeBolts.enemy = bots.filter(b => b.team === 'enemy' && !b._siege).reduce((s, b) => s + (b.gems||0), 0);
  if (siegeBolts.enemy >= 10 && !siegeEnemyBot) {
    bots.filter(b => b.team === 'enemy').forEach(b => b.gems = 0);
    siegeBolts.enemy = 0;
    siegeEnemyBot = spawnSiegeBot('enemy');
  }
  if (siegeEnemyBot && !siegeEnemyBot.alive) siegeEnemyBot = null;

  // 시즈봇 이동 — 적 IKE를 향해 직진
  for (const b of bots.filter(b => b._siege)) {
    const targetIke = b._siegeTeam === 'ally' ? SIEGE_ENEMY_IKE : SIEGE_ALLY_IKE;
    const ikeHp = b._siegeTeam === 'ally' ? siegeIke.enemy : siegeIke.ally;
    if (ikeHp <= 0) continue;
    const dx = targetIke.x - b.x, dy = targetIke.y - b.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 50) {
      moveEntity(b, (dx/dist)*b.d.spd, (dy/dist)*b.d.spd);
    }
    // IKE에 인접하면 데미지
    if (dist < 55) {
      if (b._siegeTeam === 'ally') {
        siegeIke.enemy -= b.d.dmg * dt;
        spawnParts(targetIke.x, targetIke.y, '#ffe100', 1);
      } else {
        siegeIke.ally -= b.d.dmg * dt;
        spawnParts(targetIke.x, targetIke.y, '#ff4444', 1);
      }
    }
  }

  // IKE 자동 사격 (시즈봇에게)
  for (const side of ['ally', 'enemy']) {
    siegeIkeShootTimer[side] -= dt;
    if (siegeIke[side] <= 0) continue;
    if (siegeIkeShootTimer[side] > 0) continue;
    const ikePos = side === 'ally' ? SIEGE_ALLY_IKE : SIEGE_ENEMY_IKE;
    // 범위 내 적 시즈봇 찾기
    const enemySide = side === 'ally' ? 'enemy' : 'ally';
    const targets2 = bots.filter(b => b._siege && b._siegeTeam === enemySide && b.alive);
    if (targets2.length) {
      const tgt = targets2[0];
      const d2 = Math.hypot(tgt.x - ikePos.x, tgt.y - ikePos.y);
      if (d2 < TS * 10) {
        const a = Math.atan2(tgt.y - ikePos.y, tgt.x - ikePos.x);
        const spd = 8;
        const bul = makeBullet(ikePos.x, ikePos.y, Math.cos(a)*spd, Math.sin(a)*spd,
          3000, side === 'ally' ? 'ally' : 'enemy', side === 'ally' ? '#ffe100' : '#ff4444', 'normal', 7);
        bul.life = d2 / spd + 5;
        bullets.push(bul);
        siegeIkeShootTimer[side] = 1.2;
      }
    }
  }

  // 승패 조건
  if (siegeIke.enemy <= 0) { endGame(true); return; }
  if (siegeIke.ally <= 0)  { endGame(false); return; }
  if (siegeTimer <= 0) {
    const allyDmg  = SIEGE_IKE_MAX_HP - siegeIke.ally;
    const enemyDmg = SIEGE_IKE_MAX_HP - siegeIke.enemy;
    if (enemyDmg === allyDmg && !siegeOvertime) {
      // 동률 → 연장전 30초
      siegeOvertime = true;
      siegeTimer = 30;
      spawnParts(player.x, player.y, '#ffe100', 30);
      return;
    }
    endGame(enemyDmg >= allyDmg);
    return;
  }
}

function drawSiege() {
  if (!siegeIke) return;
  function drawIke(pos, hp, color, label) {
    const sx = pos.x - cam.x, sy = pos.y - cam.y;
    const ratio = Math.max(0, hp / SIEGE_IKE_MAX_HP);
    // 기지 몸체
    ctx.save();
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.85;
    ctx.beginPath(); ctx.arc(sx, sy, 28, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.stroke();
    // 아이콘
    ctx.font = '26px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff'; ctx.fillText('🏰', sx, sy);
    // HP 바
    const bw = 70, bh = 8;
    const bx = sx - bw/2, by = sy - 42;
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(bx-1, by-1, bw+2, bh+2);
    ctx.fillStyle = ratio > 0.5 ? '#4caf50' : ratio > 0.25 ? '#ff9800' : '#f44336';
    ctx.fillRect(bx, by, bw*ratio, bh);
    // 이름
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial';
    ctx.fillText(label, sx, sy + 40);
    ctx.restore();
  }
  drawIke(SIEGE_ALLY_IKE,  siegeIke.ally,  '#1565c0', '아군 IKE');
  drawIke(SIEGE_ENEMY_IKE, siegeIke.enemy, '#b71c1c', '적 IKE');
}

// 녹아웃: 부활 없이 3전2선승제
let koRound=0, koWins={ally:0,enemy:0};
function updateKnockout(dt) {
  const aliveE=bots.filter(b=>b.team==='enemy'&&b.alive).length;
  const aliveA=bots.filter(b=>b.team==='ally'&&b.alive).length+(player&&player.alive?1:0);
  if (aliveE===0) {
    koWins.ally++;
    if (koWins.ally>=2) { endGame(true); return; }
    koRound++; respawnRound();
  } else if (aliveA===0) {
    koWins.enemy++;
    if (koWins.enemy>=2) { endGame(false); return; }
    koRound++; respawnRound();
  }
}
function respawnRound() {
  const ps=safeSpawn('left'); player.x=ps.x; player.y=ps.y; player.hp=player.maxHp; player.alive=true; isDead=false;
  bots.forEach(b=>{ if(b.team==='ally'||b.team==='enemy'){ const sp=safeSpawn(b.team==='ally'?'left':'right'); b.x=sp.x;b.y=sp.y;b.hp=b.maxHp;b.alive=true;b.botRespawnTimer=0;b.botRespawnCount=0;}});
  spawnParts(player.x,player.y,'#ffe100',15);
}

function updateMines(dt) {
  mines = mines.filter(mine => {
    if (!mine.alive) return false;
    mine.timer -= dt;
    if (mine.timer <= 0) {
      // 폭발
      spawnParts(mine.x, mine.y, '#2e7d32', 18);
      spawnParts(mine.x, mine.y, '#ff8f00', 12);
      const targets = getTargets(mine.owner);
      const attacker = mine.owner==='player' ? player : null;
      for (const t of targets) {
        if (!t.alive) continue;
        const d = Math.hypot(t.x-mine.x, t.y-mine.y);
        if (d < TS*3) { damage(t, 1200*(1-d/(TS*3)*0.5), attacker); checkKill(t, mine.owner); }
      }
      return false;
    }
    // 근접 시 즉시 폭발 (적이 밟으면)
    const targets2 = getTargets(mine.owner);
    for (const t of targets2) {
      if (!t.alive) continue;
      if (Math.hypot(t.x-mine.x, t.y-mine.y) < 28) {
        mine.timer = 0; // 다음 프레임에 폭발
        return true;
      }
    }
    return true;
  });
}
function drawMines() {
  for (const mine of mines) {
    if (!mine.alive) continue;
    const sx = mine.x - cam.x, sy = mine.y - cam.y;
    ctx.save();
    ctx.font = '18px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('💣', sx, sy);

    ctx.font = 'bold 10px Arial';
    ctx.fillText(`${mine.timer.toFixed(1)}s`, sx, sy+14);
    ctx.restore();
  }
}

function updateHealTurret(dt) {
  if (!healTurret) return;
  healTurret.healTimer = (healTurret.healTimer || 0) + dt;
  if (healTurret.healTimer >= 0.5) {
    healTurret.healTimer = 0;
    const healRange = TS * 6;
    const healAmt = 600;
    const allies = [player, ...bots].filter(t => t && t.alive &&
      (t === player || t.team === 'ally' || t.team === healTurret.team));
    for (const t of allies) {
      const hd = Math.hypot(t.x - healTurret.x, t.y - healTurret.y);
      if (hd < healRange && t.hp < t.maxHp) {
        t.hp = Math.min(t.maxHp, t.hp + healAmt);
        spawnParts(t.x, t.y, '#4caf50', 5);
      }
    }
  }
}

// 보스전 함수들
// ────────────────────────────────────────────────────────────
function bossGetTargets() {
  const allTargets = [player, ...bots.filter(b => b !== bossEnt && b.team === 'ally')].filter(t => t && t.alive);
  return allTargets.filter(t => {
    const d = Math.hypot(t.x - bossEnt.x, t.y - bossEnt.y);
    if (t.inBush && d > 36) return false; // 풀숲 속이면 1타일 이내만 감지
    if (sandyBuff && (t === player || t.team === 'ally') && d > 50) return false; // 샌디 은신 중 감지 불가
    return true;
  });
}

function bossShootSpread(count, dmg) {
  const targets = bossGetTargets();
  if (!targets.length) return;
  let nearest = targets[0], nearestD = Math.hypot(targets[0].x - bossEnt.x, targets[0].y - bossEnt.y);
  for (const t of targets) {
    const d = Math.hypot(t.x - bossEnt.x, t.y - bossEnt.y);
    if (d < nearestD) { nearestD = d; nearest = t; }
  }
  const baseAngle = Math.atan2(nearest.y - bossEnt.y, nearest.x - bossEnt.x);
  const spread = count > 1 ? 0.35 : 0;
  for (let i = 0; i < count; i++) {
    const a = baseAngle + (i - (count - 1) / 2) * spread;
    const spd = 6;
    const bossColor = (BOSS_WAVES[bossWave-1] || BOSS_WAVES[0]).color;
    const b = makeBullet(bossEnt.x, bossEnt.y, Math.cos(a)*spd, Math.sin(a)*spd,
      dmg, 'enemy', bossColor, 'normal', 8);
    b.life = 75; bullets.push(b);
  }
  SFX.botShoot('bullet');
}

function bossShootBurst(count, dmg, lockedAngle) {
  const angle = lockedAngle ?? 0;
  const spread = count > 1 ? 0.22 : 0;
  const rounds = 4;      // 한 묶음 4발
  const interval = 110;  // 발 간격 ms
  const pause = 600;     // 묶음 사이 쉬는 시간 ms
  const groups = 2;      // 두두두두 × 2묶음
  const bossColor = (BOSS_WAVES[bossWave-1] || BOSS_WAVES[0]).color;
  for (let g = 0; g < groups; g++) {
    const groupStart = g * (rounds * interval + pause);
    for (let v = 0; v < rounds; v++) {
      setTimeout(() => {
        if (!bossEnt || !bossEnt.alive) return;
        for (let i = 0; i < count; i++) {
          const a = angle + (i - (count-1)/2) * spread;
          const spd = 6;
          const b = makeBullet(bossEnt.x, bossEnt.y, Math.cos(a)*spd, Math.sin(a)*spd,
            dmg * 0.6, 'enemy', bossColor, 'normal', 8);
          b.life = 75; bullets.push(b);
        }
        SFX.botShoot('bullet');
      }, groupStart + v * interval);
    }
  }
}

function bossSpecialAttack() {
  if (!bossEnt || !bossEnt.alive) return;
  const targets = bossGetTargets();
  const w = BOSS_WAVES[bossWave - 1] || BOSS_WAVES[0];
  const baseDmg = bossEnt._bossDmg || w.dmg;
  const wColor = w.color;

  switch (bossWave) {
    case 1: { // 다크 킹: 어둠 충격파 — 12방향 암흑탄
      const cnt = bossPhase >= 3 ? 16 : 12;
      for (let i = 0; i < cnt; i++) {
        const a = (Math.PI*2/cnt)*i;
        const b = makeBullet(bossEnt.x, bossEnt.y, Math.cos(a)*5, Math.sin(a)*5, baseDmg*0.8, 'enemy', '#8b0000', 'normal', 10);
        b.life = 55; bullets.push(b);
      }
      spawnParts(bossEnt.x, bossEnt.y, '#8b0000', 30);
      break;
    }
    case 2: { // 해골 군주: 뼈 소환 — 플레이어 주변 무작위 낙하
      for (const t of targets) {
        for (let i = 0; i < 4; i++) {
          const ox = t.x + (Math.random()-0.5)*TS*6, oy = t.y + (Math.random()-0.5)*TS*6;
          const ttime = 40 + Math.random()*20;
          const bul = makeBullet(bossEnt.x, bossEnt.y, (ox-bossEnt.x)/ttime, (oy-bossEnt.y)/ttime, baseDmg*0.9, 'enemy', '#bdbdbd', 'lob', 10);
          bul.life=0; bul.lobLife=ttime; bul.lobMax=ttime; bul.lobRadius=TS*1.2; bullets.push(bul);
        }
      }
      spawnParts(bossEnt.x, bossEnt.y, '#37474f', 20);
      break;
    }
    case 3: { // 화염 군주: 화염 고리 — 플레이어 주변 원형 폭탄
      for (const t of targets) {
        const cnt2 = 6;
        for (let i = 0; i < cnt2; i++) {
          const a = (Math.PI*2/cnt2)*i;
          const ox = t.x + Math.cos(a)*TS*2.5, oy = t.y + Math.sin(a)*TS*2.5;
          const ttime = 35;
          const bul = makeBullet(bossEnt.x, bossEnt.y, (ox-bossEnt.x)/ttime, (oy-bossEnt.y)/ttime, baseDmg, 'enemy', '#ff6d00', 'lob', 12);
          bul.life=0; bul.lobLife=ttime; bul.lobMax=ttime; bul.lobRadius=TS*2; bullets.push(bul);
        }
      }
      spawnParts(bossEnt.x, bossEnt.y, '#e65100', 25);
      break;
    }
    case 4: { // 번개 황제: 번개 연쇄 — 경고 시 고정된 위치로 발사
      const pts = (bossSpecialWarning && bossSpecialWarning.lockedTargets) ||
        targets.slice().sort((a,b2) => Math.hypot(a.x-bossEnt.x,a.y-bossEnt.y) - Math.hypot(b2.x-bossEnt.x,b2.y-bossEnt.y)).slice(0,3).map(t=>({x:t.x,y:t.y}));
      pts.forEach((pt, idx) => {
        setTimeout(() => {
          if (!bossEnt || !bossEnt.alive) return;
          spawnParts(pt.x, pt.y, '#ffe57f', 15);
          for (let i=0;i<6;i++){const a=(Math.PI*2/6)*i;const b=makeBullet(pt.x,pt.y,Math.cos(a)*8,Math.sin(a)*8,baseDmg*0.8,'enemy','#ffe57f','normal',6);b.life=30;bullets.push(b);}
        }, idx*250);
      });
      spawnParts(bossEnt.x, bossEnt.y, '#1a237e', 20);
      break;
    }
    case 5: { // 최종 악마: 공포 인력 — 모든 타겟을 보스 쪽으로 끌어당김
      for (const t of targets) {
        const dx = bossEnt.x - t.x, dy = bossEnt.y - t.y;
        const dist = Math.hypot(dx, dy) || 1;
        const pull = Math.min(dist * 0.4, TS*5);
        t.x += (dx/dist)*pull; t.y += (dy/dist)*pull; unstuck(t);
        spawnParts(t.x, t.y, '#4a0080', 12);
      }
      spawnParts(bossEnt.x, bossEnt.y, '#4a0080', 40);
      SFX.lobExplode();
      break;
    }
    case 6: { // 빙하 군주: 빙결 폭풍 — 슬로우 탄환 전방위
      const cnt3 = 14;
      for (let i=0;i<cnt3;i++){
        const a=(Math.PI*2/cnt3)*i;
        const b=makeBullet(bossEnt.x,bossEnt.y,Math.cos(a)*5,Math.sin(a)*5,baseDmg*0.7,'enemy','#aee8ff','normal',10);
        b.life=150; b.isIce=true; b.dmg=baseDmg*0.2; bullets.push(b);
      }
      // 범위 내 타겟 슬로우 (중첩 가능)
      for (const t of targets) {
        if (Math.hypot(t.x-bossEnt.x,t.y-bossEnt.y)<TS*6) { t.slowTimer=(t.slowTimer||0)+20; spawnParts(t.x,t.y,'#aee8ff',8); }
      }
      spawnParts(bossEnt.x, bossEnt.y, '#0077b6', 30);
      break;
    }
    case 7: { // 독액 마왕: 독안개 — 광역 독 + 독 투척
      for (const t of targets) {
        if (Math.hypot(t.x-bossEnt.x,t.y-bossEnt.y)<TS*8) {
          t.poisonTimer=5; t.poisonDmg=Math.round(baseDmg*0.15); spawnParts(t.x,t.y,'#2d6a4f',10);
        }
      }
      for (let i=0;i<8;i++){
        const a=(Math.PI*2/8)*i;
        const ox=bossEnt.x+Math.cos(a)*TS*3, oy=bossEnt.y+Math.sin(a)*TS*3;
        const tt=30;
        const b=makeBullet(bossEnt.x,bossEnt.y,(ox-bossEnt.x)/tt,(oy-bossEnt.y)/tt,baseDmg*0.6,'enemy','#2d6a4f','lob',10);
        b.life=0;b.lobLife=tt;b.lobMax=tt;b.lobRadius=TS*1.8;bullets.push(b);
      }
      spawnParts(bossEnt.x, bossEnt.y, '#2d6a4f', 35);
      break;
    }
    case 8: { // 우주 괴물: 중력 폭탄 — 타겟 끌어당긴 뒤 폭발
      for (const t of targets) {
        const dx=bossEnt.x-t.x,dy=bossEnt.y-t.y,dist=Math.hypot(dx,dy)||1;
        const pull=Math.min(dist*0.35,TS*4);
        t.x+=(dx/dist)*pull;t.y+=(dy/dist)*pull;unstuck(t);
      }
      setTimeout(()=>{
        if(!bossEnt||!bossEnt.alive)return;
        for(const t of bossGetTargets()){
          const d=Math.hypot(t.x-bossEnt.x,t.y-bossEnt.y);
          if(d<TS*5){damage(t,baseDmg*1.5,bossEnt,true);checkKill(t,'enemy');spawnParts(t.x,t.y,'#b39ddb',10);}
        }
        spawnParts(bossEnt.x,bossEnt.y,'#5c4db1',50);
      }, 600);
      spawnParts(bossEnt.x, bossEnt.y, '#5c4db1', 20);
      break;
    }
    case 9: { // 심연의 신: 생명력 흡수 — 타겟 HP 흡수해 보스 회복
      let totalAbsorb = 0;
      for (const t of targets) {
        const absorbAmt = Math.min(t.hp * 0.25, baseDmg);
        damage(t, absorbAmt, bossEnt, true); checkKill(t, 'enemy');
        totalAbsorb += absorbAmt; spawnParts(t.x, t.y, '#1b1b2f', 10);
      }
      bossEnt.hp = Math.min(bossEnt.maxHp, bossEnt.hp + totalAbsorb);
      spawnParts(bossEnt.x, bossEnt.y, '#9c27b0', 30);
      SFX.lobExplode();
      break;
    }
    case 10: { // 고대 드래곤: 용의 숨결 — 가장 가까운 타겟 향해 넓은 화염 콘
      if (!targets.length) break;
      const tgt = targets[0];
      const baseA = Math.atan2(tgt.y-bossEnt.y, tgt.x-bossEnt.x);
      for (let i=0;i<10;i++){
        const a=baseA+(i-4.5)*0.18;
        const b=makeBullet(bossEnt.x,bossEnt.y,Math.cos(a)*8,Math.sin(a)*8,baseDmg*0.85,'enemy','#ff6d00','normal',8);
        b.life=60;bullets.push(b);
      }
      spawnParts(bossEnt.x, bossEnt.y, '#6d4c00', 25);
      break;
    }
    case 11: { // 혼돈의 신: 혼돈 폭풍 — 불규칙 방향 20발
      for (let i=0;i<20;i++){
        const a=Math.random()*Math.PI*2;
        const spd=4+Math.random()*5;
        const b=makeBullet(bossEnt.x,bossEnt.y,Math.cos(a)*spd,Math.sin(a)*spd,baseDmg*0.7,'enemy','#0d6efd','normal',8);
        b.life=50+Math.random()*30;bullets.push(b);
      }
      spawnParts(bossEnt.x, bossEnt.y, '#003566', 30);
      break;
    }
    case 12: { // 파멸의 군주: 파멸 폭발 — 초광역 즉발 데미지
      const radius=TS*9;
      for (const t of targets) {
        const d=Math.hypot(t.x-bossEnt.x,t.y-bossEnt.y);
        if(d<radius){damage(t,baseDmg*(1-d/radius*0.4),bossEnt,true);checkKill(t,'enemy');spawnParts(t.x,t.y,'#7f1d1d',12);}
      }
      for(let i=0;i<20;i++){const a=(Math.PI*2/20)*i;const b=makeBullet(bossEnt.x,bossEnt.y,Math.cos(a)*9,Math.sin(a)*9,baseDmg*0.6,'enemy','#ff4444','normal',8);b.life=60;bullets.push(b);}
      spawnParts(bossEnt.x, bossEnt.y, '#7f1d1d', 60);
      SFX.lobExplode();
      break;
    }
    case 13: { // 영원한 어둠: 어둠 광선 — 3방향 관통 저격
      if (!targets.length) break;
      const tgt2=targets[0];
      const baseA2=Math.atan2(tgt2.y-bossEnt.y,tgt2.x-bossEnt.x);
      [-0.3,0,0.3].forEach(off=>{
        const b=makeBullet(bossEnt.x,bossEnt.y,Math.cos(baseA2+off)*16,Math.sin(baseA2+off)*16,baseDmg*1.5,'enemy','#c0c0ff','sniper',7);
        b.life=70;b.pierce=true;bullets.push(b);
      });
      spawnParts(bossEnt.x, bossEnt.y, '#2d2d4e', 25);
      break;
    }
    case 14: { // 신계의 지배자: 신의 심판 — 전방위 폭발 + 보스 자신 회복
      const cnt4=22;
      for(let i=0;i<cnt4;i++){const a=(Math.PI*2/cnt4)*i;const b=makeBullet(bossEnt.x,bossEnt.y,Math.cos(a)*8,Math.sin(a)*8,baseDmg*0.9,'enemy','#ffd700','normal',8);b.life=60;bullets.push(b);}
      bossEnt.hp=Math.min(bossEnt.maxHp, bossEnt.hp+bossEnt.maxHp*0.05);
      spawnParts(bossEnt.x, bossEnt.y, '#78350f', 40);
      spawnParts(bossEnt.x, bossEnt.y, '#ffd700', 20);
      break;
    }
    case 15: { // 창조자의 적: 창조의 분노 — 전방위 다중 반사탄
      for(let i=0;i<16;i++){
        const a=(Math.PI*2/16)*i;
        const b=makeBullet(bossEnt.x,bossEnt.y,Math.cos(a)*11,Math.sin(a)*11,baseDmg*0.8,'enemy','#e040fb','bounce',8);
        b.life=100;b.bounces=8;b.ricoShot=true;bullets.push(b);
      }
      spawnParts(bossEnt.x, bossEnt.y, '#1e1b4b', 50);
      break;
    }
    default: { // 알 수 없는 웨이브: 기본 충격파
      const cnt5=12;
      for(let i=0;i<cnt5;i++){const a=(Math.PI*2/cnt5)*i;const b=makeBullet(bossEnt.x,bossEnt.y,Math.cos(a)*5,Math.sin(a)*5,baseDmg*0.8,'enemy',wColor,'normal',10);b.life=55;bullets.push(b);}
      spawnParts(bossEnt.x, bossEnt.y, wColor, 30);
    }
  }
  SFX.lobExplode();
}

function bossLobAttack() {
  const targets = bossGetTargets();
  if (!targets.length) return;
  const t = targets[Math.random() * targets.length | 0];
  // 2초 경고 표시 먼저
  bossLobWarning = { x: t.x, y: t.y, timer: 2.8 };
}

function bossFireLob(wx, wy) {
  const dist = Math.max(60, Math.hypot(wx - bossEnt.x, wy - bossEnt.y));
  const ttime = Math.max(20, Math.min(80, dist / 7));
  const spd2 = dist / ttime;
  const a = Math.atan2(wy - bossEnt.y, wx - bossEnt.x);
  const bossLobColor = (BOSS_WAVES[bossWave-1] || BOSS_WAVES[0]).color;
  const b = makeBullet(bossEnt.x, bossEnt.y, Math.cos(a)*spd2, Math.sin(a)*spd2,
    (bossEnt._bossDmg || 1200) * 5, 'enemy', bossLobColor, 'lob', 12);
  b.life = 0; b.lobLife = ttime; b.lobMax = ttime; b.lobRadius = TS * 2.0; b.isBossLob = true;
  bullets.push(b);
  spawnParts(bossEnt.x, bossEnt.y, '#ff4400', 10);
}

function bossSpawnMinion() {
  const minionPool = ['shelly','colt','bull','edgar','elprimo'];
  const key = minionPool[Math.random() * minionPool.length | 0];
  const side = Math.random() < 0.5 ? 'right' : 'any';
  const sp = safeSpawn(side);
  const minion = makeEntity(sp.x, sp.y, key, 'enemy');
  minion.hp = Math.round(minion.hp * 0.7);
  minion.maxHp = minion.hp;
  minion._bossMinion = true;
  bots.push(minion);
  spawnParts(sp.x, sp.y, '#ff0000', 15);
}

function spawnNextBoss() {
  const w = BOSS_WAVES[bossWave - 1];
  const bsp = { x: (MX-3)*TS, y: MY*TS/2 };
  playerBossDmg = 0; botBossDmgMap = {};
  // 기존 보스/부하 제거
  bots = bots.filter(b => !b._isBoss && !b._bossMinion);
  bossEnt = makeEntity(bsp.x, bsp.y, 'frank', 'enemy');
  bossEnt.hp = bossEnt.maxHp = w.hp;
  bossEnt.d = Object.assign({}, bossEnt.d, {
    name: w.name, ico: w.ico, color: w.color,
    spd: w.spd, dmg: w.dmg, range: 320, reload: w.fireRate, atk: 'bullet', regen: 0
  });
  bossEnt._isBoss = true;
  bossEnt._bossSpd = w.spd;
  bossEnt._bossDmg = w.dmg;
  bossEnt._bossFireRate = w.fireRate;
  bots.push(bossEnt);
  bossPhase = 1;
  bossAttackTimer = 1.5;
  bossShockwaveTimer = 8;
  bossMinionTimer = 20;
  bossLobTimer = 6;
  bossWaveClearing = false;
  // 플레이어·아군 체력 회복
  if (player && player.alive) { player.hp = player.maxHp; player.regenTimer = 0; }
  bots.forEach(b => { if (b.team === 'ally' && b.alive) { b.hp = b.maxHp; b.regenTimer = 0; } });
  spawnParts(bsp.x, bsp.y, w.color, 60);
  SFX.superActivate();
}

function updateBoss(dt) {
  if (!bossEnt || !bossEnt.alive) return;

  const hpRatio = bossEnt.hp / bossEnt.maxHp;
  const newPhase = hpRatio > 0.5 ? 1 : hpRatio > 0.25 ? 2 : 3;

  if (newPhase > bossPhase) {
    bossPhase = newPhase;
    spawnParts(bossEnt.x, bossEnt.y, '#ff0000', 50);
    spawnParts(bossEnt.x, bossEnt.y, '#ffffff', 20);
    SFX.superActivate();
    // 페이즈별 강화 (웨이브 기본값 기준 배율)
    const wBase = BOSS_WAVES[bossWave - 1] || BOSS_WAVES[0];
    if (bossPhase === 2) {
      bossEnt._bossSpd = wBase.spd * 1.1; bossEnt._bossDmg = wBase.dmg * 1.1; bossEnt._bossFireRate = wBase.fireRate * 0.88;
    } else if (bossPhase === 3) {
      bossEnt._bossSpd = wBase.spd * 1.2; bossEnt._bossDmg = wBase.dmg * 1.2; bossEnt._bossFireRate = wBase.fireRate * 0.75;
    }
  }

  const targets = bossGetTargets();
  if (!targets.length) return;

  let nearest = targets[0], nearestD = Math.hypot(targets[0].x - bossEnt.x, targets[0].y - bossEnt.y);
  for (const t of targets) {
    const d = Math.hypot(t.x - bossEnt.x, t.y - bossEnt.y);
    if (d < nearestD) { nearestD = d; nearest = t; }
  }

  bossEnt.angle = Math.atan2(nearest.y - bossEnt.y, nearest.x - bossEnt.x);
  const spd = bossEnt._bossSpd || 1.8;
  const keepDist = bossPhase === 1 ? 180 : bossPhase === 2 ? 130 : 90;

  if (nearestD > keepDist) {
    moveEntity(bossEnt, Math.cos(bossEnt.angle) * spd, Math.sin(bossEnt.angle) * spd);
  } else if (nearestD < 60) {
    moveEntity(bossEnt, -Math.cos(bossEnt.angle) * spd * 0.8, -Math.sin(bossEnt.angle) * spd * 0.8);
  }

  // 기본 공격: 경고(1.0초) 후 고정 방향 연사 → 3초 사이클
  const BOSS_WARN = 1.0;
  bossAttackTimer -= dt;
  bossAttackWarning = Math.max(0, bossAttackTimer);
  // 경고 시작 시점에 조준 방향 고정
  if (bossAttackWarning < BOSS_WARN && bossLockedAngle === null) {
    const aimTs = bossGetTargets();
    if (aimTs.length) {
      let near = aimTs[0], nearD = Infinity;
      for (const t of aimTs) { const d = Math.hypot(t.x-bossEnt.x, t.y-bossEnt.y); if (d < nearD) { nearD=d; near=t; } }
      bossLockedAngle = Math.atan2(near.y - bossEnt.y, near.x - bossEnt.x);
    }
  }
  if (bossAttackTimer <= 0) {
    bossAttackTimer = 3.0; // 연사(~1.5초) + 휴식이 포함된 고정 사이클
    bossAttackWarning = bossAttackTimer;
    const cnt = bossPhase === 1 ? 3 : bossPhase === 2 ? 4 : 5;
    bossShootBurst(cnt, bossEnt._bossDmg || 1200, bossLockedAngle);
    bossLockedAngle = null;
  }

  // 충격파 예고 카운트다운 처리
  if (bossSpecialWarning) {
    bossSpecialWarning.timer -= dt;
    if (bossSpecialWarning.timer <= 0) {
      bossSpecialAttack();
      bossLobTimer = Math.max(bossLobTimer, 5);
      bossSpecialWarning = null;
    }
  }

  // 충격파 (로브 경고/특수 예고 중엔 발동 안 함)
  bossShockwaveTimer -= dt;
  if (bossShockwaveTimer <= 0 && !bossLobWarning && !bossSpecialWarning) {
    bossShockwaveTimer = bossPhase >= 3 ? 7 : 10;
    // 웨이브4(번개황제) 특수: 경고 시 타겟 위치 고정
    let lockedTargets = null;
    if (bossWave === 4) {
      const ts4 = bossGetTargets().sort((a,b2) => Math.hypot(a.x-bossEnt.x,a.y-bossEnt.y) - Math.hypot(b2.x-bossEnt.x,b2.y-bossEnt.y)).slice(0,3);
      lockedTargets = ts4.map(t => ({ x: t.x, y: t.y }));
    }
    bossSpecialWarning = { timer: 1.5, lockedTargets }; // 1.5초 예고 후 발동
  }

  // 벽 너머 로브 공격 (충격파 직후엔 발동 안 함)
  bossLobTimer -= dt;
  if (bossLobTimer <= 0 && !bossLobWarning) {
    bossLobTimer = bossPhase >= 3 ? 6 : bossPhase === 2 ? 8 : 10;
    bossLobAttack();
    bossShockwaveTimer = Math.max(bossShockwaveTimer, 5); // 로브 후 5초간 충격파 유예
  }
  // 경고 타이머 → 만료 시 발사
  if (bossLobWarning) {
    bossLobWarning.timer -= dt;
    if (bossLobWarning.timer <= 0) {
      if (bossEnt && bossEnt.alive) bossFireLob(bossLobWarning.x, bossLobWarning.y);
      bossLobWarning = null;
      bossShockwaveTimer = Math.max(bossShockwaveTimer, 7); // 로브 발사 후 7초간 충격파 유예
      bossAttackTimer = Math.max(bossAttackTimer, 1.2);     // 로브 발사 후 잠깐 기본 공격 유예
    }
  }

  // 페이즈2+ 부하 소환
  if (bossPhase >= 2) {
    bossMinionTimer -= dt;
    if (bossMinionTimer <= 0) {
      bossMinionTimer = bossPhase >= 3 ? 15 : 22;
      bossSpawnMinion();
    }
  }

  // 벽 끼임 방지
  const R2 = 15;
  if (solid(bossEnt.x-R2, bossEnt.y) || solid(bossEnt.x+R2, bossEnt.y) ||
      solid(bossEnt.x, bossEnt.y-R2) || solid(bossEnt.x, bossEnt.y+R2)) {
    unstuck(bossEnt);
  }
}

function drawBossLobWarning() {
  if (!bossLobWarning) return;
  const sx = bossLobWarning.x - cam.x;
  const sy = bossLobWarning.y - cam.y;
  const ratio = 1 - bossLobWarning.timer / 2.0; // 0→1로 점점 커짐
  const r = TS * 2.0 * (0.4 + ratio * 0.6);
  const alpha = 0.3 + Math.sin(Date.now() * 0.01) * 0.2;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#ff0000';
  ctx.lineWidth = 3 + ratio * 3;
  ctx.beginPath();
  ctx.arc(sx, sy, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = alpha * 0.15;
  ctx.fillStyle = '#ff0000';
  ctx.fill();
  ctx.restore();
}

function drawBossSpecialWarning() {
  if (!bossSpecialWarning || !bossEnt || !bossEnt.alive) return;
  const sx = bossEnt.x - cam.x, sy = bossEnt.y - cam.y;
  const ratio = 1 - bossSpecialWarning.timer / 1.5; // 0→1
  const pulse = 0.4 + Math.sin(Date.now() * 0.018) * 0.4;
  // 실제 공격 사거리에 맞게 최대 TS*6 까지 확장
  const maxR = TS * 2.5;
  const r = 40 + ratio * (maxR - 40);
  ctx.save();
  // 내부 반투명 채움 (위험 구역 표시)
  ctx.globalAlpha = 0.04 + ratio * 0.10;
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.arc(sx, sy, r, 0, Math.PI * 2);
  ctx.fill();
  // 테두리 링
  ctx.globalAlpha = 0.35 + pulse * 0.25;
  ctx.strokeStyle = '#ffaa00';
  ctx.lineWidth = 3 + ratio * 4;
  ctx.setLineDash([10, 6]);
  ctx.beginPath();
  ctx.arc(sx, sy, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  // "⚠" 경고 아이콘
  ctx.globalAlpha = 0.8 + pulse * 0.2;
  ctx.fillStyle = '#ffe000';
  ctx.font = `bold ${20 + ratio * 6}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('⚠', sx, sy - 50);
  ctx.restore();

  // 번개황제: 낙뢰 착탄 위치 경고 원
  if (bossSpecialWarning.lockedTargets) {
    const pulse2 = 0.5 + Math.sin(Date.now() * 0.025) * 0.5;
    for (const pt of bossSpecialWarning.lockedTargets) {
      const tx = pt.x - cam.x, ty = pt.y - cam.y;
      ctx.save();
      ctx.globalAlpha = 0.25 + pulse2 * 0.45;
      ctx.strokeStyle = '#ffe57f';
      ctx.lineWidth = 3 + ratio * 2;
      ctx.beginPath();
      ctx.arc(tx, ty, 28 + ratio * 20, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 0.08 + pulse2 * 0.12;
      ctx.fillStyle = '#ffe57f';
      ctx.fill();
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = '#fff700';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('⚡', tx, ty);
      ctx.restore();
    }
  }
}

function drawBoss() {
  if (!bossEnt || !bossEnt.alive) return;
  const sx = bossEnt.x - cam.x, sy = bossEnt.y - cam.y;
  if (sx < -70 || sx > W+70 || sy < -70 || sy > H+70) return;

  const R = 30 + (bossPhase - 1) * 4;
  const hpRatio = bossEnt.hp / bossEnt.maxHp;

  // 그림자
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + R + 6, R * 1.3, R * 0.4, 0, 0, Math.PI*2);
  ctx.fill();

  const wData = BOSS_WAVES[bossWave - 1] || BOSS_WAVES[0];
  const bColor = wData.color;

  // 특수 공격 예고 글로우 (노란 충전 오라)
  if (bossSpecialWarning) {
    const chargeRatio = 1 - bossSpecialWarning.timer / 1.5;
    const glowR = R + 15 + chargeRatio * 20 + Math.sin(Date.now()*0.025)*6;
    ctx.beginPath();
    ctx.arc(sx, sy, glowR, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,220,0,${0.15 + chargeRatio*0.25})`;
    ctx.fill();
  }

  // 기본 공격 예고: 고정 조준선 + 테두리 글로우 (bossLockedAngle 있을 때만)
  const WARN_TIME = 1.2;
  if (bossLockedAngle !== null && bossAttackWarning > 0) {
    const intensity = Math.min(1, 1 - bossAttackWarning / WARN_TIME);
    const cnt = bossPhase === 1 ? 3 : bossPhase === 2 ? 4 : 5;
    ctx.save();
    for (let i = 0; i < cnt; i++) {
      const a = bossLockedAngle + (i - (cnt-1)/2) * 0.22;
      const ca = Math.cos(a), sa2 = Math.sin(a);
      let wx = bossEnt.x, wy = bossEnt.y;
      for (let dist = 8; dist < TS * 12; dist += 8) {
        wx = bossEnt.x + ca * dist;
        wy = bossEnt.y + sa2 * dist;
        if (solid(wx, wy)) break;
      }
      const ex = wx - cam.x, ey = wy - cam.y;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(ex, ey);
      ctx.strokeStyle = `rgba(255,60,60,${0.2 + intensity * 0.5})`;
      ctx.lineWidth = 1.5 + intensity * 2;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.restore();
    // 테두리 글로우
    ctx.beginPath();
    ctx.arc(sx, sy, R + 8, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,50,50,${intensity * 0.8})`;
    ctx.lineWidth = 5 + intensity * 5;
    ctx.stroke();
  } // end bossAttackWarning

  // 페이즈3 분노 오라
  if (bossPhase >= 3) {
    const aura = R + 12 + Math.sin(Date.now()*0.009)*8;
    ctx.beginPath();
    ctx.arc(sx, sy, aura, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,80,0,${0.15 + Math.sin(Date.now()*0.007)*0.08})`;
    ctx.fill();
  }
  // 페이즈2 오라
  if (bossPhase === 2) {
    ctx.beginPath();
    ctx.arc(sx, sy, R + 8 + Math.sin(Date.now()*0.008)*5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,100,0,0.12)`;
    ctx.fill();
  }

  // 몸체 (웨이브 색상 적용)
  ctx.beginPath();
  ctx.arc(sx, sy, R, 0, Math.PI*2);
  ctx.fillStyle = bossEnt.flash > 0 ? '#fff' : bColor;
  ctx.fill();
  ctx.strokeStyle = bossPhase >= 3 ? '#ff4400' : bossPhase >= 2 ? '#ff8800' : '#ffcc00';
  ctx.lineWidth = 5;
  ctx.stroke();
  if (bossEnt.flash > 0) bossEnt.flash--;

  // 이모지 (웨이브별 아이콘)
  ctx.font = `${R * 1.4}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(wData.ico, sx, sy);

  // 페이즈 별
  ctx.font = '16px serif';
  ctx.textAlign = 'center';
  for (let i = 0; i < bossPhase; i++) {
    ctx.fillText('⭐', sx - (bossPhase - 1) * 12 + i * 24, sy + R + 18);
  }

  // HP 바
  const bw = 90, bh = 10;
  const bx = sx - bw/2, by = sy - R - 26;
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(bx-1, by-1, bw+2, bh+2);
  ctx.fillStyle = hpRatio > 0.5 ? '#ff4444' : hpRatio > 0.25 ? '#ff8800' : '#ff0000';
  ctx.fillRect(bx, by, bw * hpRatio, bh);

  // 보스 이름 (웨이브별 이름)
  ctx.fillStyle = '#ffcc00';
  ctx.font = `bold 13px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(`${wData.ico} ${wData.name} ${'★'.repeat(bossPhase)}  HP:${Math.ceil(bossEnt.hp).toLocaleString()}`, sx, by - 3);
}

// ────────────────────────────────────────────────────────────
// 보석
// ────────────────────────────────────────────────────────────
function spawnGemCenter() {
  for (let i=0;i<30;i++) {
    const tx = (MX/2|0) + ((Math.random()*5-2)|0);
    const ty = (MY/2|0) + ((Math.random()*5-2)|0);
    if (map[ty] && map[ty][tx]===T.EMPTY) {
      gems.push({ x:tx*TS+TS/2, y:ty*TS+TS/2, alive:true, bob:Math.random()*Math.PI*2 });
      return;
    }
  }
}

function updateGems(dt) {
  gems = gems.filter(g => {
    if (!g.alive) return false;
    g.bob += dt*3;
    const gsx = g.x-cam.x, gsy = g.y-cam.y;
    // 픽업 체크
    if (player && player.alive && Math.hypot(player.x-g.x, player.y-g.y) < 28) {
      player.gems++;
      score += 2;
      g.alive = false;
      spawnParts(g.x, g.y, '#00ff88', 6);
      SFX.gemCollect();
      return false;
    }
    for (const b of bots) {
      if (b.alive && Math.hypot(b.x-g.x, b.y-g.y) < 28) {
        b.gems++;
        g.alive = false;
        return false;
      }
    }
    return true;
  });
}
function drawGems() {
  for (const g of gems) {
    if (!g.alive) continue;
    ctx.font = '20px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('💎', g.x-cam.x, g.y-cam.y + Math.sin(g.bob)*3);
  }
}

let playerAmmo = 3;
let playerAmmoTimer = 0;
let superCooldown = 0;
let kenjiThrustReady = true; // 탄약 풀충전 시 찌르기, 이후 휘두르기
let kenjiSlideState = null;  // { vx, vy, timer, maxTimer }

function handlePlayerInput(dt) {
  if (!player || !player.alive) return;
  // 벽에 끼었으면 자동으로 밀어냄
  const R = 10;
  if (solid(player.x-R, player.y) || solid(player.x+R, player.y) ||
      solid(player.x, player.y-R) || solid(player.x, player.y+R)) {
    unstuck(player);
  }
  // 돌진 중엔 키 이동 무시 (updateDash에서 처리)
  if (!dashState) {
    let dx=0, dy=0;
    if (joyL.active) {
      dx = joyL.dx; dy = joyL.dy;
    } else {
      if (keys['ArrowLeft']||keys['a']||keys['A']) dx -= 1;
      if (keys['ArrowRight']||keys['d']||keys['D']) dx += 1;
      if (keys['ArrowUp']||keys['w']||keys['W'])   dy -= 1;
      if (keys['ArrowDown']||keys['s']||keys['S']) dy += 1;
      if (dx && dy) { dx*=0.707; dy*=0.707; }
    }
    const slowMult = (player.slowTimer > 0) ? 0.35 : 1.0;
    moveEntity(player, dx*player.d.spd*slowMult, dy*player.d.spd*slowMult);
  }

  // 오른쪽 조이스틱 조준 및 자동 발사
  if (joyR.active) {
    const len = Math.hypot(joyR.dx, joyR.dy);
    if (len > 0.15 && player) {
      const nx = joyR.dx / len, ny = joyR.dy / len;
      const ex = nx > 0 ? MX*TS-TS-player.x : player.x-TS;
      const ey = ny > 0 ? MY*TS-TS-player.y : player.y-TS;
      const maxEdge = (nx===0 ? Math.abs(ey/ny) : ny===0 ? Math.abs(ex/nx) : Math.min(Math.abs(ex/nx), Math.abs(ey/ny))) * 0.88;
      const jrDist = Math.min(len * (player.d.range || 300), maxEdge);
      mouseWorld.x = player.x + nx * jrDist;
      mouseWorld.y = player.y + ny * jrDist;
    }
  }

  player.angle = Math.atan2(mouseWorld.y-player.y, mouseWorld.x-player.x);

  // 덤불
  const tx=player.x/TS|0, ty=player.y/TS|0;
  player.inBush = map[ty]&&map[ty][tx]===T.BUSH;

  // 쿨다운
  // 탄약 충전 (탄약 < 3이면 자동 충전, 1개씩)
  if (player && playerAmmo < 3) {
    playerAmmoTimer += dt;
    if (playerAmmoTimer >= player.d.reload) {
      playerAmmo++;
      playerAmmoTimer = 0;
      if (playerAmmo === 3 && player.defKey === 'kenji') kenjiThrustReady = true;
    }
  }
  if (superCooldown>0) superCooldown -= dt;

  // 에드거 패시브: 시간이 지나면 슈퍼 서서히 충전 (초당 약 3%)
  if (player.defKey === 'edgar' && !player.superReady) {
    player.superCharge = Math.min(100, player.superCharge + dt * 3);
    if (player.superCharge >= 100) player.superReady = true;
  }
}

// 공통: 방향의 벽 파괴
function breakWalls(ox, oy, angle, steps, radius) {
  for (let step = 0; step <= steps; step++) {
    const cx = ox + Math.cos(angle) * step * TS;
    const cy = oy + Math.sin(angle) * step * TS;
    for (let dy2 = -Math.ceil(radius); dy2 <= Math.ceil(radius); dy2++) {
      for (let dx2 = -Math.ceil(radius); dx2 <= Math.ceil(radius); dx2++) {
        if (Math.hypot(dx2, dy2) > radius) continue;
        const tx = (cx/TS|0) + dx2, ty = (cy/TS|0) + dy2;
        if (tx<1||tx>=MX-1||ty<1||ty>=MY-1) continue;
        if (map[ty]&&map[ty][tx]===T.WALL) {
          map[ty][tx] = T.EMPTY;
          spawnParts(tx*TS+TS/2, ty*TS+TS/2, '#8b6332', 7);
          spawnParts(tx*TS+TS/2, ty*TS+TS/2, '#d4a56a', 4);
        }
      }
    }
  }
}

// 엘프리모 돌진 상태
let dashState = null; // { vx, vy, timer, dmg }

function autoAimToNearest() {
  if (!player) return;
  // 실제 적 봇 (보스 경고 관련 가짜 오브젝트 제외)
  let enemies = getTargets('player').filter(t => !t._isWarning && !t._isBossWarning);
  // 하이스트: 적 금고도 타겟에 추가
  if (selMode === 'heist' && heistHp && heistHp.enemy > 0) {
    enemies = [...enemies, { x: HEIST_ENEMY_VAULT.x, y: HEIST_ENEMY_VAULT.y, _isVault: true }];
  }
  if (enemies.length === 0) return;
  const hasLOS = en => {
    for (let i = 1; i <= 12; i++) {
      const t = i / 12;
      if (solid(player.x + (en.x - player.x) * t, player.y + (en.y - player.y) * t)) return false;
    }
    return true;
  };
  const visible = enemies.filter(hasLOS);
  const pool = visible.length > 0 ? visible : enemies;
  let nearest = pool[0], minD = Math.hypot(nearest.x - player.x, nearest.y - player.y);
  for (const en of pool) {
    const d = Math.hypot(en.x - player.x, en.y - player.y);
    if (d < minD) { minD = d; nearest = en; }
  }
  mouseWorld.x = nearest.x;
  mouseWorld.y = nearest.y;
}

function activateSuper() {

    let tx2 = Math.max(TS*1.5, Math.min(MX*TS-TS*1.5, mouseWorld.x));
    let ty2 = Math.max(TS*1.5, Math.min(MY*TS-TS*1.5, mouseWorld.y));

    spawnParts(player.x, player.y, '#78350f', 50);
    spawnParts(player.x, player.y, '#ffd700', 30);
    for (let i = 0; i < 22; i++) {
      const a = (Math.PI*2/22)*i;
      const b = makeBullet(player.x, player.y, Math.cos(a)*10, Math.sin(a)*10, 4000, 'player', '#ffd700', 'normal', 8);
      b.life = 65; b.isSuper = true; bullets.push(b);
    }
    player.hp = Math.min(player.maxHp, player.hp + player.maxHp * 0.4);
    spawnParts(player.x, player.y, '#00ff88', 20);

  } else if (key === 'creatorsfoe') {
    // 🔱 창조의 파괴: 전방위 무한 반사탄
    spawnParts(player.x, player.y, '#1e1b4b', 60);
    spawnParts(player.x, player.y, '#e040fb', 30);
    for (let i = 0; i < 16; i++) {
      const a = (Math.PI*2/16)*i;
      const b = makeBullet(player.x, player.y, Math.cos(a)*13, Math.sin(a)*13, 4500, 'player', '#e040fb', 'bounce', 9);
      b.life = 120; b.bounces = 15; b.ricoShot = true; b.isSuper = true; bullets.push(b);
    }

  } else if (key === 'kenji') {
    // ❌ 환영 참격: 마우스 위치로 날아가 X자 4방향 공격 후 원래 자리 귀환
    const ox = player.x, oy = player.y;
    let tx2 = Math.max(TS, Math.min(MX*TS-TS, mouseWorld.x));
    let ty2 = Math.max(TS, Math.min(MY*TS-TS, mouseWorld.y));
    if (solid(tx2, ty2)) { const sp = safeSpawn('any'); tx2 = sp.x; ty2 = sp.y; }
    spawnParts(ox, oy, '#9c27b0', 15);
    player.x = tx2; player.y = ty2;
    unstuck(player);
    spawnParts(player.x, player.y, '#e040fb', 30);
    // X자 4방향 (대각선) 검기
    const xAngles = [Math.PI*0.25, Math.PI*0.75, Math.PI*1.25, Math.PI*1.75];
    for (const xa of xAngles) {
      const b = makeBullet(player.x, player.y, Math.cos(xa)*14, Math.sin(xa)*14,
        player.d.dmg * 8, 'player', '#9c27b0', 'normal', 13);
      b.life = 45; b.isSuper = true; bullets.push(b);
    }
    // 150ms 후 원래 자리로 귀환
    setTimeout(() => {
      if (!player || !player.alive) return;
      spawnParts(player.x, player.y, '#9c27b0', 12);
      player.x = ox; player.y = oy;
      unstuck(player);
      spawnParts(player.x, player.y, '#e040fb', 18);
    }, 400);

  } else if (key === 'sirius') {
    // 🔮 분신술: 마우스 위치 주변에 분신 3개 소환 (8초)
    const cloneOffsets = [
      { x: -TS*2, y: 0 }, { x: TS*2, y: 0 }, { x: 0, y: -TS*2 }
    ];
    for (const off of cloneOffsets) {
      let cx = Math.max(TS, Math.min(MX*TS-TS, mouseWorld.x + off.x));
      let cy = Math.max(TS, Math.min(MY*TS-TS, mouseWorld.y + off.y));
      if (solid(cx, cy)) { const sp = safeSpawn('any'); cx = sp.x; cy = sp.y; }
      const clone = makeEntity(cx, cy, 'sirius', 'ally');
      unstuck(clone);
      clone.hp = clone.maxHp = Math.round(player.maxHp * 0.6);
      clone.d = Object.assign({}, clone.d, { ico:'🌟', name:'분신', dmg: Math.round(player.d.dmg * 0.8) });
      clone._tempBot = true; clone._tempLife = 8; clone._noflee = true;
      bots.push(clone);
      spawnParts(cx, cy, '#7b1fa2', 20);
    }
    spawnParts(player.x, player.y, '#e040fb', 35);

  } else if (key === 'mystery') {
    // 💥 극한 반사 폭풍: 리코 슈퍼 6배 (90발, 13200데미지, 9바운스)
    for (let i = 0; i < 90; i++) {
      setTimeout(() => {
        if (!player || !player.alive) return;
        const a = angle + (Math.random()-0.5)*0.35;
        const b = makeBullet(player.x, player.y, Math.cos(a)*15, Math.sin(a)*15,
          13200, 'player', '#b71c1c', 'bounce', 9);
        b.life = 140; b.bounces = 9; b.ricoShot = true; b.isSuper = true; bullets.push(b);
        spawnParts(player.x, player.y, '#b71c1c', 2);
        SFX.shoot('bounce');
      }, i*40);
    }

  } else if (key === 'bang') {
    // ❗ 극한 연사: 5줄 × 5발 강화 데미지
    for (let i = 0; i < 5; i++) {
      const a = angle + (i - 2) * 0.22;
      for (let j = 0; j < 5; j++) {
        setTimeout(() => {
          if (state !== 'playing') return;
          const b = makeBullet(player.x, player.y, Math.cos(a)*12, Math.sin(a)*12,
            player.d.dmg * 5, 'player', '#ff1744', 'bounce', 7);
          b.life = 100; b.bounces = 5; b.ricoShot = true; b.isSuper = true; bullets.push(b);
        }, j * 80);
      }
    }
    spawnParts(player.x, player.y, '#ff1744', 25);
    spawnParts(player.x, player.y, '#ffffff', 10);

  } else if (key === 'hisoka') {
    // 🩷 번지검: 주변 전체 5000 고정 데미지
    const hRadius = TS * 6;
    spawnParts(player.x, player.y, '#7e57c2', 30);
    for (const t of getTargets('player')) {
      if (!t.alive) continue;
      const hd = Math.hypot(t.x-player.x, t.y-player.y);
      if (hd < hRadius) {
        damage(t, 5000, player, true);
        checkKill(t, 'player');
        spawnParts(t.x, t.y, '#ce93d8', 8);
      }
    }

  } else if (key === 'feitan') {
    // 💊 치유 포탑: 마우스 위치에 설치, 반경 내 아군 0.5초마다 체력 회복
    const fx = Math.max(TS, Math.min(MX*TS-TS, mouseWorld.x));
    const fy = Math.max(TS, Math.min(MY*TS-TS, mouseWorld.y));
    healTurret = { x: fx, y: fy, hp: 5000, maxHp: 5000, team: 'player', healTimer: 0 };
    spawnParts(fx, fy, '#4caf50', 30);
  }

  player.superCharge = 0;
  player.superReady  = false;
  superCooldown = 0.3;
}

// 켄지 찌르기 슬라이드 업데이트
function updateKenjiSlide(dt) {
  if (!kenjiSlideState) return;
  kenjiSlideState.timer -= 60 * dt;
  const ratio = Math.max(0, kenjiSlideState.timer / kenjiSlideState.maxTimer);
  const spd = ratio; // 감속: 처음엔 빠르고 점점 느려짐
  const nx = player.x + kenjiSlideState.vx * spd;
  const ny = player.y + kenjiSlideState.vy * spd;
  const R = 12;
  if (!solid(nx-R,player.y-R)&&!solid(nx+R,player.y-R)&&!solid(nx-R,player.y+R)&&!solid(nx+R,player.y+R))
    player.x = Math.max(R, Math.min(MX*TS-R, nx));
  if (!solid(player.x-R,ny-R)&&!solid(player.x+R,ny-R)&&!solid(player.x-R,ny+R)&&!solid(player.x+R,ny+R))
    player.y = Math.max(R, Math.min(MY*TS-R, ny));
  spawnParts(player.x, player.y, '#9c27b0', 1);
  if (kenjiSlideState.timer <= 0) kenjiSlideState = null;
}

// 돌진 업데이트 (루프에서 호출)
function updateDash(dt) {
  if (!dashState) return;
  dashState.timer -= 60*dt;

  // 이동
  const nx = player.x + dashState.vx;
  const ny = player.y + dashState.vy;
  const R = 12;
  if (!solid(nx-R,player.y-R)&&!solid(nx+R,player.y-R)&&!solid(nx-R,player.y+R)&&!solid(nx+R,player.y+R))
    player.x = Math.max(R, Math.min(MX*TS-R, nx));
  if (!solid(player.x-R,ny-R)&&!solid(player.x+R,ny-R)&&!solid(player.x-R,ny+R)&&!solid(player.x+R,ny+R))
    player.y = Math.max(R, Math.min(MY*TS-R, ny));

  // 돌진 중 적 히트
  const allT = getTargets('player');
  for (const t of allT) {
    if (!t.alive || dashState.hit.has(t)) continue;
    if (Math.hypot(t.x-player.x, t.y-player.y) < 40) {
      damage(t, dashState.dmg, player, true);
      checkKill(t, 'player');
      dashState.hit.add(t);
      spawnParts(player.x, player.y, '#fff', 8);
    }
  }

  // 불: 돌진 중 산탄 발사
  if (dashState.isBull) {
    dashState.shootTimer -= 60*dt;
    if (dashState.shootTimer <= 0) {
      dashState.shootTimer = 8;
      for (let i=0;i<3;i++) {
        const a = dashState.angle + (Math.random()-.5)*0.5;
        const b = makeBullet(player.x, player.y, Math.cos(a)*7, Math.sin(a)*7,
          300, 'player', '#795548', 'normal', 4);
        b.life = 20; bullets.push(b);
      }
    }
  }

  spawnParts(player.x, player.y, player.d.color, 2);

  if (dashState.timer <= 0) dashState = null;
}

function tryShoot(isSuper) {
  if (!player || !player.alive) return;
  if (state !== 'playing') return;
  if (isSuper) {
    activateSuper();
  } else {
    // 브롤볼: 공을 들고 있거나 근처에 있으면 마우스 방향으로 킥
    if (selMode === 'brawlball' && brawlBall) {
      const distToBall = Math.hypot(player.x - brawlBall.x, player.y - brawlBall.y);
      const holding = brawlBall.holder === player;
      if (holding || distToBall < 80) {
        if (playerAmmo > 0) {
          const dx = mouseWorld.x - player.x;
          const dy = mouseWorld.y - player.y;
          const dist = Math.sqrt(dx*dx + dy*dy) || 1;
          brawlBall.holder = null;
          brawlBall.vx = (dx/dist) * 10;
          brawlBall.vy = (dy/dist) * 10;
          playerAmmo--;
          if (playerAmmo < 3 && playerAmmoTimer === 0) playerAmmoTimer = 0;
          SFX.shoot('normal');
        }
        return;
      }
    }
    if (playerAmmo > 0) {
      if (player.defKey === 'mystery') {
        // ❓ 일반공격: 리코 슈퍼와 동일 (15발 고속 반사탄)
        const capX = mouseWorld.x, capY = mouseWorld.y;
        for (let i = 0; i < 15; i++) {
          setTimeout(() => {
            if (!player || !player.alive) return;
            const a = Math.atan2(capY - player.y, capX - player.x) + (Math.random()-0.5)*0.12;
            const b = makeBullet(player.x, player.y, Math.cos(a)*13, Math.sin(a)*13,
              2200, 'player', '#b71c1c', 'bounce', 7);
            b.life = 110; b.bounces = 9; b.ricoShot = true; bullets.push(b);
            SFX.shoot('bounce');
          }, i*60);
        }
        playerAmmo--;
        return;
      } else if (player.d.atk === 'arrow' || player.defKey === 'colt' || player.defKey === 'rico' || player.defKey === 'lightning') {
        // 보·콜트·리코·제시·번개황제: 5발 시간차 연사
        const capX = mouseWorld.x, capY = mouseWorld.y;
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            if (!player || !player.alive) return;
            bullets.push(...shootBullets(player, capX, capY, false));
            SFX.shoot(player.d.atk);
          }, i * 100);
        }
      } else if (player.defKey === 'feitan') {
        // 팸: 6발 시간차 연사
        const capX = mouseWorld.x, capY = mouseWorld.y;
        for (let i = 0; i < 6; i++) {
          setTimeout(() => {
            if (!player || !player.alive) return;
            bullets.push(...shootBullets(player, capX, capY, false));
            SFX.shoot('bullet');
          }, i * 80);
        }
      } else {
        bullets.push(...shootBullets(player, mouseWorld.x, mouseWorld.y, false));
        SFX.shoot(player.d.atk);
      }
      playerAmmo--;
    }
  }
}
