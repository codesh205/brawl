// 이벤트 등록
// ────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key] = true;
  if (e.key===' '||e.key==='z'||e.key==='Z') tryShoot(false);
  if (e.key==='e'||e.key==='E') tryShoot(true);
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseWorld.x = (e.clientX - r.left) + cam.x;
  mouseWorld.y = (e.clientY - r.top)  + cam.y;
});
canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  if (e.button===0) tryShoot(false);
  if (e.button===2) tryShoot(true);
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ────────────────────────────────────────────────────────────
// 모바일 하단 패널 조이스틱
// ────────────────────────────────────────────────────────────
(function setupJoystick() {
  if (!('ontouchstart' in window) && navigator.maxTouchPoints < 1) return;

  const controlsEl      = document.getElementById('controls');
  const mobileControls  = document.getElementById('mobile-controls');
  const mcLeft          = document.getElementById('mc-left');
  const mcLeftKnob      = document.getElementById('mc-left-knob');
  const mcRight         = document.getElementById('mc-right');
  const mcRightKnob     = document.getElementById('mc-right-knob');
  const mcSuper         = document.getElementById('mc-super');
  const PANEL_H = 160;
  const MCR = 46; // 패널 조이스틱 최대 반지름

  if (controlsEl) controlsEl.style.display = 'none';
  canvas.style.touchAction = 'none';

  // 캔버스를 세로 공간에 맞게 축소, 가로 중앙 정렬
  function applyMobileLayout() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const bar = document.getElementById('trophy-bar');
    const barH = (bar && bar.style.display !== 'none') ? bar.offsetHeight : 0;
    const availH = vh - PANEL_H - barH;
    const scale = Math.min(vw / W, availH / H);
    const wrap = document.getElementById('wrap');
    wrap.style.transform = `scale(${scale})`;
    wrap.style.transformOrigin = 'top left';
    wrap.style.marginLeft = `${(vw - W * scale) / 2}px`;
    wrap.style.marginTop = `${barH}px`;
    wrap.style.marginBottom = `${-H * (1 - scale)}px`;
    document.body.style.flexDirection = 'column';
    document.body.style.justifyContent = 'flex-start';
    document.body.style.alignItems = 'flex-start';
  }
  window.addEventListener('resize', applyMobileLayout);

  function resetKnob(k) { k.style.transform = 'translate(-50%,-50%)'; }

  function resetAll() {
    joyL.active = false; joyL.dx = 0; joyL.dy = 0; resetKnob(mcLeftKnob);
    joyR.active = false; joyR.dx = 0; joyR.dy = 0; resetKnob(mcRightKnob);
    joyS.active = false; joyS.dx = 0; joyS.dy = 0; mcSuper.style.transform = '';
  }

  // ── 이동 조이스틱 (왼쪽)
  mcLeft.addEventListener('touchstart', e => {
    e.preventDefault();
    if (state !== 'playing' || joyL.active) return;
    const t = e.changedTouches[0];
    joyL.active = true; joyL.id = t.identifier; joyL.dx = 0; joyL.dy = 0;
  }, { passive: false });

  mcLeft.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier !== joyL.id) continue;
      const r = mcLeft.getBoundingClientRect();
      let dx = t.clientX - (r.left + r.width / 2);
      let dy = t.clientY - (r.top  + r.height / 2);
      const len = Math.hypot(dx, dy);
      if (len > MCR) { dx = dx/len*MCR; dy = dy/len*MCR; }
      joyL.dx = dx / MCR; joyL.dy = dy / MCR;
      mcLeftKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }
  }, { passive: false });

  function endL(id) {
    if (joyL.id !== id) return;
    joyL.active = false; joyL.dx = 0; joyL.dy = 0; resetKnob(mcLeftKnob);
  }
  mcLeft.addEventListener('touchend',    e => { for (const t of e.changedTouches) endL(t.identifier); });
  mcLeft.addEventListener('touchcancel', e => { for (const t of e.changedTouches) endL(t.identifier); });

  // ── 공격 조이스틱 (오른쪽)
  mcRight.addEventListener('touchstart', e => {
    e.preventDefault();
    if (state !== 'playing' || joyR.active) return;
    const t = e.changedTouches[0];
    joyR.active = true; joyR.id = t.identifier; joyR.dx = 0; joyR.dy = 0;
  }, { passive: false });

  window.addEventListener('touchmove', e => {
    if (!joyR.active) return;
    for (const t of e.changedTouches) {
      if (t.identifier !== joyR.id) continue;
      const r = mcRight.getBoundingClientRect();
      let dx = t.clientX - (r.left + r.width / 2);
      let dy = t.clientY - (r.top  + r.height / 2);
      const len = Math.hypot(dx, dy);
      if (len > MCR) { dx = dx/len*MCR; dy = dy/len*MCR; }
      joyR.dx = dx / MCR; joyR.dy = dy / MCR;
      mcRightKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }
  }, { passive: true });

  window.addEventListener('touchend', e => {
    if (!joyR.active) return;
    for (const touch of e.changedTouches) {
      if (touch.identifier !== joyR.id) continue;
      // 손 뗄 때 조이스틱 중심 기준 실제 드래그 방향 계산
      const r = mcRight.getBoundingClientRect();
      const rawDx = touch.clientX - (r.left + r.width / 2);
      const rawDy = touch.clientY - (r.top  + r.height / 2);
      const dragLen = Math.hypot(rawDx, rawDy);
      const wasTap = dragLen < 15; // 15px 미만이면 탭 (자동조준)
      joyR.active = false; joyR.dx = 0; joyR.dy = 0; resetKnob(mcRightKnob);
      if (state !== 'playing' || !player) continue;
      if (wasTap) {
        // 탭: 자동조준
        const enemies = getTargets('player');
        if (enemies.length === 0) continue;
        const hasLOS = en => {
          for (let i = 1; i <= 12; i++) {
            const s = i / 12;
            if (solid(player.x + (en.x - player.x) * s, player.y + (en.y - player.y) * s)) return false;
          }
          return true;
        };
        const visible = enemies.filter(hasLOS);
        const pool = visible.length > 0 ? visible : enemies;
        let nearest = pool[0], minD = Math.hypot(nearest.x - player.x, nearest.y - player.y);
        for (const en of pool) {
          const d = Math.hypot(en.x - player.x, en.y - player.y);
          if (d < minD) { minD = d; nearest = en; }
        }
        mouseWorld.x = nearest.x;
        mouseWorld.y = nearest.y;
      } else {
        // 드래그: 조이스틱 방향으로 조준 (맵 끝벽 안쪽으로 제한)
        const nx = rawDx / dragLen, ny = rawDy / dragLen;
        const ex = nx > 0 ? MX*TS-TS-player.x : player.x-TS;
        const ey = ny > 0 ? MY*TS-TS-player.y : player.y-TS;
        const maxEdge = (nx===0 ? Math.abs(ey/ny) : ny===0 ? Math.abs(ex/nx) : Math.min(Math.abs(ex/nx), Math.abs(ey/ny))) * 0.88;
        const aimDist = Math.min(Math.min(dragLen/MCR,1) * (player.d.range||300), maxEdge);
        mouseWorld.x = player.x + nx * aimDist;
        mouseWorld.y = player.y + ny * aimDist;
      }
      tryShoot(false);
    }
  });
  window.addEventListener('touchcancel', e => {
    if (!joyR.active) return;
    for (const t of e.changedTouches) {
      if (t.identifier !== joyR.id) continue;
      joyR.active = false; joyR.dx = 0; joyR.dy = 0; resetKnob(mcRightKnob);
    }
  });

  // ── 슈퍼 조이스틱 (중앙 버튼, 밀어서 조준 → 떼면 발동)
  mcSuper.addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    if (state !== 'playing' || joyS.active) return;
    const t = e.changedTouches[0];
    joyS.active = true; joyS.id = t.identifier; joyS.dx = 0; joyS.dy = 0;
  }, { passive: false });

  window.addEventListener('touchmove', e => {
    if (!joyS.active) return;
    for (const t of e.changedTouches) {
      if (t.identifier !== joyS.id) continue;
      const r = mcSuper.getBoundingClientRect();
      let dx = t.clientX - (r.left + r.width / 2);
      let dy = t.clientY - (r.top  + r.height / 2);
      const len = Math.hypot(dx, dy);
      const SR = 38;
      if (len > SR) { dx = dx/len*SR; dy = dy/len*SR; }
      joyS.dx = dx / SR; joyS.dy = dy / SR;
      mcSuper.style.transform = `translate(${dx * 0.5}px, ${dy * 0.5}px)`;
      if (player && len > 8) {
        mouseWorld.x = player.x + joyS.dx * 300;
        mouseWorld.y = player.y + joyS.dy * 300;
      }
    }
  }, { passive: true });

  window.addEventListener('touchend', e => {
    if (!joyS.active) return;
    for (const t of e.changedTouches) {
      if (t.identifier !== joyS.id) continue;
      const sr = mcSuper.getBoundingClientRect();
      const rawDx = t.clientX - (sr.left + sr.width / 2);
      const rawDy = t.clientY - (sr.top  + sr.height / 2);
      const dragLen = Math.hypot(rawDx, rawDy);
      const wasTap = dragLen < 10;
      joyS.active = false; joyS.dx = 0; joyS.dy = 0;
      mcSuper.style.transform = '';
      if (state === 'playing') {
        if (wasTap) autoAimToNearest();
        else if (player) { const nx = rawDx/dragLen, ny = rawDy/dragLen; mouseWorld.x = Math.max(TS, Math.min(MX*TS-TS, player.x + nx*600)); mouseWorld.y = Math.max(TS, Math.min(MY*TS-TS, player.y + ny*600)); }
        tryShoot(true);
      }
    }
  });
  window.addEventListener('touchcancel', e => {
    if (!joyS.active) return;
    for (const t of e.changedTouches) {
      if (t.identifier !== joyS.id) continue;
      joyS.active = false; joyS.dx = 0; joyS.dy = 0; mcSuper.style.transform = '';
    }
  });

  // ── 게임 상태에 따른 패널 표시
  const origStartGame = window.startGame;
  window.startGame = function() {
    origStartGame && origStartGame();
    mobileControls.style.display = 'flex';
    applyMobileLayout();
  };
  const origReturnMenu = window.returnMenu;
  window.returnMenu = function() {
    origReturnMenu && origReturnMenu();
    mobileControls.style.display = 'none';
    resetAll();
    const wrap = document.getElementById('wrap');
    wrap.style.transform = '';
    wrap.style.marginLeft = '';
    wrap.style.marginBottom = '';
    document.body.style.flexDirection = '';
    document.body.style.justifyContent = '';
    document.body.style.alignItems = '';
  };
  const origReplayGame = window.replayGame;
  window.replayGame = function() {
    origReplayGame && origReplayGame();
    mobileControls.style.display = 'flex';
    applyMobileLayout();
    resetAll();
  };
})();

// ────────────────────────────────────────────────────────────
// 게임 루프
// ────────────────────────────────────────────────────────────
function loop(ts) {
  if (state !== 'playing') return;
  const dt = Math.min((ts - prevT) / 1000, 0.05);
  prevT = ts;

  // ── 업데이트 ──
  handlePlayerInput(dt);
  updateDash(dt);
  updateKenjiSlide(dt);
  updateCam();

  // 임시 봇(소환물) 수명 처리
  for (const b of bots) {
    if (b._tempBot && b.alive) {
      b._tempLife -= dt;
      if (b._tempLife <= 0) { b.alive = false; }
      // 터렛은 이동하지 않도록 spd=0 유지
    }
  }
  // 죽은 임시봇 제거
  bots = bots.filter(b => !(b._tempBot && !b.alive));

  for (const b of bots) { if (b._isBoss) continue; updateBot(b, dt); }
  if (selMode === 'boss') updateBoss(dt);
  updateBullets(dt);
  updateParticles(dt);
  updateRegen(dt);
  updatePoison(dt);
  updateMines(dt);

  // 버프 타이머
  // (8비트 부스터는 HP로만 소멸 - 타이머 없음)
  if (sandyBuff)  { sandyBuff.timer  -= dt; if (sandyBuff.timer <=0) sandyBuff=null; }
  if (player && player.slowTimer > 0) player.slowTimer -= dt;
  updateHealTurret(dt);

  // 모드별
  if (selMode==='gemgrab') {
    gemSpawnTimer -= dt;
    if (gemSpawnTimer<=0) { gemSpawnTimer=3; spawnGemCenter(); }
    updateGems(dt);

    const totalGems  = (player?player.gems:0) + bots.filter(b=>b.team==='ally').reduce((s,b)=>s+b.gems,0);
    const enemyGems  = bots.filter(b=>b.team==='enemy').reduce((s,b)=>s+b.gems,0);
    // 아군 10개 → 카운트다운 후 승리
    if (totalGems>=10) {
      gemCDtimer += dt;
      if (gemCDtimer>=1) { gemCDtimer=0; gemCD--; }
      if (gemCD<=0) { endGame(true); return; }
    } else { gemCD=20; gemCDtimer=0; }
    // 적 10개 → 카운트다운 후 패배
    if (enemyGems>=10) {
      enemyGemCDtimer = (enemyGemCDtimer||0) + dt;
      if (enemyGemCDtimer>=1) { enemyGemCDtimer=0; enemyGemCD=(enemyGemCD||20)-1; }
      if ((enemyGemCD||20)<=0) { endGame(false); return; }
    } else { enemyGemCD=20; enemyGemCDtimer=0; }
  } else if (selMode==='bounty') {
    bountyTime -= dt;
    score = kills*2;
    // 타이머 종료 시 킬 수 비교로 승패 결정 (부활 있으므로 전멸 즉시 종료 없음)
    if (bountyTime<=0) {
      const eKills = bots.filter(b=>b.team==='enemy').reduce((s,b)=>s+(b.kills||0),0);
      endGame(kills > eKills);
      return;
    }
  } else if (selMode==='heist') {
    updateHeist(dt);
  } else if (selMode==='brawlball') {
    updateBrawlBall(dt);
  } else if (selMode==='siege') {
    updateSiege(dt);
  } else if (selMode==='knockout') {
    updateKnockout(dt);
  }

  // ── 부활 시스템 (솔로/녹아웃 제외한 모든 팀전) ──
  if (!player.alive && selMode !== 'solo' && selMode !== 'knockout') {
    // 바운티: 타이머 종료 시 즉시 끝냄
    if (selMode === 'bounty' && bountyTime <= 0) {
      const eKills = bots.filter(b=>b.team==='enemy').reduce((s,b)=>s+(b.kills||0),0);
      endGame(kills > eKills); return;
    }

    // 하이스트/브롤볼은 금고HP/골로 승패가 결정되므로 전멸 체크 생략
    if (selMode !== 'heist' && selMode !== 'brawlball') {
      // 살아있거나 부활 대기 중인 적이 없으면 승리
      const activeOrWaitingEnemies = selMode === 'boss'
        ? (bossEnt && bossEnt.alive ? 1 : 0)
        : bots.filter(b => b.team === 'enemy' && (b.alive || b.botRespawnTimer > 0)).length;
      if (activeOrWaitingEnemies === 0) { endGame(true); return; }

      // 살아있는 아군이 없으면 패배
      const activeAllies = bots.filter(b => b.team === 'ally' && b.alive).length;
      if (activeAllies === 0) { endGame(false); return; }
    }

    if (!isDead) {
      // 방금 죽음 → 부활 대기 시작
      isDead = true;
      respawnTimer = 15;
      SFX.playerDeath();
    }
    respawnTimer -= dt;
    if (respawnTimer <= 0) {
      // 부활! - 베이스(맵 가장자리)에서 부활
      const sp = safeSpawn('left');
      player.x = sp.x; player.y = sp.y;
      player.hp = player.maxHp;
      player.alive = true;
      player.invincTimer = 3;
      isDead = false;
      spawnParts(player.x, player.y, '#00ff88', 20);
    }
    // 부활 대기 중 화면 그리기 (카운트다운 표시)
    ctx.clearRect(0,0,W,H);
    drawMap();
    drawGems();
    if (selMode==='heist') drawHeist();
    if (selMode==='brawlball') drawBrawlBall();
    if (selMode==='siege') drawSiege();
    for (const b of bots) { if (b._isBoss) continue; drawEnt(b); }
    if (selMode === 'boss') { drawBossLobWarning(); drawBossSpecialWarning(); drawBoss(); }
    for (const bl of bullets) drawBullet(bl);
    drawParticles();
    drawMinimap();
    updateHUD();
    // 부활 대기 오버레이
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, H/2-70, W, 140);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`${Math.ceil(respawnTimer)}초 후 부활...`, W/2, H/2);
    ctx.fillStyle = '#aaa';
    ctx.font = '16px Arial';
    ctx.fillText('팀원이 살아있습니다', W/2, H/2+40);
    ctx.restore();
    raf = requestAnimationFrame(loop);
    return;
  }

  // ── 녹아웃: 플레이어 사망 시 관전 (updateKnockout이 라운드 처리) ──
  if (!player.alive && selMode === 'knockout') {
    if (!isDead) { isDead = true; SFX.playerDeath(); }
    ctx.clearRect(0,0,W,H);
    drawMap();
    drawGems();
    for (const b of bots) drawEnt(b);
    for (const bl of bullets) drawBullet(bl);
    drawParticles();
    drawMinimap();
    updateHUD();
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, H/2-50, W, 100);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 26px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('💀 사망 — 팀원을 응원하세요!', W/2, H/2);
    ctx.restore();
    raf = requestAnimationFrame(loop);
    return;
  }

  // 승패 체크 (녹아웃은 updateKnockout에서 처리됨)
  if (!player || !player.alive) { SFX.playerDeath(); endGame(false); return; }
  if (selMode==='solo') {
    // 솔로: 봇이 모두 죽으면 승리
    const aliveAll = bots.filter(b=>b.alive && !b._tempBot).length;
    if (aliveAll===0) { endGame(true); return; }
  } else if (selMode==='boss') {
    // 보스전: 보스가 죽으면 즉시 승리 (다음 판에 다음 웨이브)
    if (!bossWaveClearing && bossEnt && !bossEnt.alive) {
      bossWaveClearing = true;
      const nextWave = Math.min(bossWave + 1, BOSS_WAVES.length);
      if (!isTrialMode) {
        try { localStorage.setItem('brawl_boss_wave', nextWave); } catch(e) {}
        try { localStorage.setItem('brawl_boss_reward_' + bossWave, '1'); } catch(e) {}
      }
      endGame(true);
    }
  } else if (selMode==='gemgrab' || selMode==='heist' || selMode==='brawlball' || selMode==='siege' || selMode==='knockout') {
    // 위 모드들은 각자의 종료 조건(보석/금고/골/시간/전멸)으로 끝남 — 여기선 추가 체크 없음
  } else if (selMode==='bounty') {
    // 바운티는 타이머로만 종료 — 여기선 추가 체크 없음
  }

  // ── 그리기 ──
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#4a7a2a'; // 잔디 기본 배경 (맵 렌더링 실패 시 대비)
  ctx.fillRect(0,0,W,H);
  drawMap();
  drawGems();
  drawMines();
  drawDamageBooster();
  drawHealTurret();
  if (selMode==='heist') drawHeist();
  if (selMode==='brawlball') drawBrawlBall();
  if (selMode==='siege') drawSiege();
  for (const b of bots) { if (b._isBoss) continue; drawEnt(b); }
  if (selMode === 'boss') { drawBossLobWarning(); drawBossSpecialWarning(); drawBoss(); }
  // 조준선
  if (player && player.alive) {
    ctx.save();
    ctx.setLineDash([4,4]);
    ctx.strokeStyle='rgba(255,255,255,0.25)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(player.x-cam.x, player.y-cam.y);
    ctx.lineTo(mouseWorld.x-cam.x, mouseWorld.y-cam.y);
    ctx.stroke();
    ctx.restore();
  }
  for (const b of bullets) drawBullet(b);
  drawParticles();
  if (player) drawEnt(player, true);
  drawMinimap();
  updateHUD();

  raf = requestAnimationFrame(loop);
}

// ────────────────────────────────────────────────────────────
// 게임 시작 / 종료
// ────────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('menu').style.display    = 'none';
  document.getElementById('gameover').style.display = 'none';
  document.getElementById('wrap').style.display    = 'block';

  state = 'playing';
  score=0; kills=0; bountyTime=120; gemCD=20; gemCDtimer=0; gemSpawnTimer=3;
  bullets=[]; particles=[]; gems=[]; bots=[]; mines=[];
  playerAmmo=3; playerAmmoTimer=0; superCooldown=0; kenjiThrustReady=true; kenjiSlideState=null;
  keys={};
  respawnTimer=0; isDead=false; dashState=null;
  damageBooster=null; sandyBuff=null; healTurret=null;
  heistHp=null; siegeTimer=0; siegeBolts=null; siegeBot=null; siegeEnemyBot=null; siegeIke=null; siegeIkeShootTimer={ally:2,enemy:2}; siegeEnemyBolts=0; siegeEnemyBoltTimer=0; brawlBall=null;
  koRound=0; koWins={ally:0,enemy:0};
  bossEnt=null; bossPhase=1; bossWaveClearing=false; bossAttackTimer=1.5; bossShockwaveTimer=8; bossMinionTimer=20; bossLobTimer=6; bossLobWarning=null; bossSpecialWarning=null; bossAttackWarning=0; bossLockedAngle=null; playerBossDmg=0; botBossDmgMap={};
  bossWave = selMode === 'boss' ? (parseInt(localStorage.getItem('brawl_boss_wave')||'1')||1) : 1;
  bossWave = Math.max(1, Math.min(bossWave, BOSS_WAVES.length));

  // 맵 랜덤 선택 (브롤볼은 공 끼임 방지를 위해 solo_default 고정)
  let chosenMap;
  if (selMode === 'brawlball') {
    chosenMap = 'solo_arena';
  } else {
    const modeMapOptions = Object.keys(MAP_LAYOUTS).filter(k=>k.startsWith(selMode+'_'));
    const fallback = Object.keys(MAP_LAYOUTS).filter(k=>k.startsWith('solo_'));
    const mapPool = modeMapOptions.length > 0 ? modeMapOptions : fallback;
    chosenMap = mapPool[Math.random()*mapPool.length|0];
  }
  map = makeMap(selMode, chosenMap);

  // 플레이어 스폰
  const ps = safeSpawn('left');
  player = makeEntity(ps.x, ps.y, selBrawler, 'player');
  // 트로피 보너스: 브롤러 개인 트로피 100개당 HP·데미지 +10% (최대 +100%)
  {
    const perT = (trophyData.perBrawler && trophyData.perBrawler[selBrawler]) || 0;
    if (selBrawler === 'mystery') {
      // ? 브롤러: 총 트로피 기준으로 무제한 스케일 (+1% HP per 100 total trophies)
      const totalT = trophyData.total || 0;
      const bonusPct = totalT / 10000; // 10000 트로피마다 +100% HP (무제한)
      player.hp    = Math.round(player.d.hp * (1 + bonusPct));
      player.maxHp = player.hp;
      player.dmgBonus = bonusPct;
    } else {
      const bonusPct = Math.min(perT / 1000, 1.0); // 0 ~ 1.0 (0% ~ 100%)
      if (bonusPct > 0) {
        player.hp    = Math.round(player.d.hp    * (1 + bonusPct));
        player.maxHp = player.hp;
        player.dmgBonus = bonusPct;
      }
    }
  }
  player.mouseX = ps.x; player.mouseY = ps.y;
  cam.x = Math.max(0, Math.min(MX*TS-W, ps.x-W/2));
  cam.y = Math.max(0, Math.min(MY*TS-H, ps.y-H/2));
  mouseWorld.x = ps.x; mouseWorld.y = ps.y;

  const HXH_KEYS = ['gon','leorio','kurapika','killua','hisoka','mystery','bang']; // 플레이어 전용
  const PLAYER_ONLY_KEYS = ['8bit', 'feitan']; // 솔로: 봇 사용 불가 / 팀전: 적 봇 사용 불가
  const bk = Object.keys(DEFS).filter(k => !HXH_KEYS.includes(k));
  const bkNoPlayerOnly = bk.filter(k => !PLAYER_ONLY_KEYS.includes(k)); // 솔로봇·적봇용
  // 보스 보상 캐릭터는 어려운 보스일수록 낮은 등장 확률 (일반=10, 보스1=3, 보스2=2, 보스3=1.5, 보스4=1, 보스5=0.5)
  const BOSS_WEIGHTS = { darkking:3, skullking:2, flamelord:1.5, lightning:1, finaldemon:0.5, icelord:0.4, poisonking:0.35, spacemonster:0.3, abyssgod:0.25, dragonlord:0.2, chaosgod:0.18, doomlord:0.15, eternaldark:0.12, divineking:0.1, creatorsfoe:0.08 };
  function weightedRandKey(pool) {
    const weights = pool.map(k => BOSS_WEIGHTS[k] ?? 10);
    const total = weights.reduce((a,b)=>a+b,0);
    let r = Math.random()*total;
    for (let i=0;i<pool.length;i++) { r-=weights[i]; if(r<=0) return pool[i]; }
    return pool[pool.length-1];
  }

  if (selMode==='solo') {
    // 솔로: 봇마다 고유 팀 번호 → 서로 + 플레이어 모두 적 (8bit·팸 봇 사용 불가)
    for (let i=0;i<9;i++) {
      const sp = safeSpawn('any');
      const ent = makeEntity(sp.x, sp.y, weightedRandKey(bkNoPlayerOnly), 'solo_'+i);
      bots.push(ent);
    }
  } else {
    // 아군: 플레이어 브롤러 제외 후 셔플 (8bit·팸 아군 사용 가능)
    const allyPool = bk.filter(k=>k!==selBrawler);
    // 셔플
    for (let i=allyPool.length-1;i>0;i--) {
      const j=Math.random()*i|0; [allyPool[i],allyPool[j]]=[allyPool[j],allyPool[i]];
    }
    const allyCount = 2;  // 플레이어 포함 항상 3v3 (플레이어+아군2 vs 적3)
    const enemyCount = selMode === 'boss' ? 0 : 3;  // 보스전: 일반 적 없음
    // 다시 플레이 시 이전 팀원 유지, 아니면 새로 랜덤 선택 후 저장
    const chosenAllies = (isReplay && lastAllyKeys && lastAllyKeys.length === allyCount)
      ? lastAllyKeys
      : allyPool.slice(0, allyCount);
    lastAllyKeys = chosenAllies;
    isReplay = false;
    for (let i=0;i<allyCount;i++) {
      const sp = safeSpawn('left');
      bots.push(makeEntity(sp.x, sp.y, chosenAllies[i], 'ally'));
    }
    for (let i=0;i<enemyCount;i++) {
      const sp = safeSpawn('right');
      bots.push(makeEntity(sp.x, sp.y, weightedRandKey(bkNoPlayerOnly), 'enemy'));
    }
    if (selMode==='gemgrab') spawnGemCenter();
    if (selMode==='heist') { heistHp={ally:20000,enemy:20000}; }
    if (selMode==='siege') { siegeTimer=120; siegeBolts={ally:0,enemy:0}; siegeBot=null; siegeEnemyBot=null; siegeIke={ally:SIEGE_IKE_MAX_HP,enemy:SIEGE_IKE_MAX_HP}; siegeIkeShootTimer={ally:2,enemy:2}; siegeEnemyBoltTimer=0; }
    if (selMode==='brawlball') { brawlBall={x:MX*TS/2,y:MY*TS/2,vx:0,vy:0,holder:null}; }
    if (selMode==='boss') {
      spawnNextBoss();
    }
  }

  if (raf) cancelAnimationFrame(raf);
  prevT = performance.now();
  raf = requestAnimationFrame(loop);
}

function endGame(win) {
  state = 'over';
  if (raf) { cancelAnimationFrame(raf); raf=null; }

  if (win) SFX.victory(); else SFX.defeat();

  // 솔로 쇼다운 순위 계산
  let soloRank = null;
  if (selMode === 'solo') {
    soloRank = win ? 1 : (bots.filter(b=>b.alive && !b._tempBot).length + 1);
  }

  const { gain, newUnlocks } = applyTrophyResult(win, soloRank);

  // 새로 해금된 모드 (이미 해금된 건 제외 - 중복 알림 방지)
  const newModes = MODES.filter(m => {
    return m.req > 0 && trophyData.total >= m.req && (trophyData.total - gain) < m.req
      && !(trophyData.unlockedModes||[]).includes(m.id);
  });

  // 솔로 쇼다운: 순위 표시
  let goEmoji, goText;
  if (selMode === 'solo' && soloRank !== null) {
    const rankEmojis = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
    goEmoji = rankEmojis[soloRank-1] || '💀';
    goText  = soloRank === 1 ? '1등 - 우승!' : `${soloRank}등`;
  } else {
    goEmoji = win ? '🏆' : '💀';
    goText  = win ? '승리!' : '패배...';
  }

  document.getElementById('goEmoji').textContent = goEmoji;
  document.getElementById('goText').textContent  = goText;
  document.getElementById('goSub').textContent   = bossFailMsg || `점수: ${score}  처치: ${kills}`;
  bossFailMsg = '';
  document.getElementById('goTrophy').textContent = isTrialMode
    ? '🔓 체험 모드 — 트로피 변동 없음'
    : `🏆 ${gain >= 0 ? '+' : ''}${gain} 트로피  (총 ${trophyData.total})`;

  const unlockEl = document.getElementById('goUnlock');
  const allUnlocks = [
    ...newUnlocks.map(k => DEFS[k].ico + ' ' + DEFS[k].name + ' (브롤러)'),
    ...newModes.map(m => m.ico + ' ' + m.name + ' (모드)'),
  ];
  if (allUnlocks.length > 0) {
    unlockEl.style.display = 'block';
    unlockEl.textContent = '🎉 해금! ' + allUnlocks.join(', ');
  } else {
    unlockEl.style.display = 'none';
  }

  // 대미지/치유 통계
  const allEnts = [player, ...bots.filter(b => !b._tempBot)];
  const statsEl = document.getElementById('goStats');
  const topDmg = allEnts.reduce((a, b) => (b.totalDamage > a.totalDamage ? b : a), allEnts[0]);
  const topHeal = allEnts.reduce((a, b) => (b.totalHealing > a.totalHealing ? b : a), allEnts[0]);
  if (topDmg.totalDamage > 0 || topHeal.totalHealing > 0) {
    let html = '';
    if (topDmg.totalDamage > 0) {
      const isPlayer = topDmg === player;
      html += `⚔️ 최다 대미지: <b>${topDmg.d.ico} ${topDmg.d.name}${isPlayer ? ' (나)' : ''}</b> — ${Math.round(topDmg.totalDamage).toLocaleString()}<br>`;
    }
    if (topHeal.totalHealing > 0) {
      const isPlayer = topHeal === player;
      html += `💚 최다 치유: <b>${topHeal.d.ico} ${topHeal.d.name}${isPlayer ? ' (나)' : ''}</b> — ${Math.round(topHeal.totalHealing).toLocaleString()}`;
    }
    statsEl.innerHTML = html;
    statsEl.style.display = 'block';
  } else {
    statsEl.style.display = 'none';
  }

  document.getElementById('gameover').style.display = 'flex';
}

function replayGame() {
  isReplay = true;
  startGame();
}

function returnMenu() {
  state='menu';
  if (raf) { cancelAnimationFrame(raf); raf=null; }
  document.getElementById('gameover').style.display='none';
  document.getElementById('wrap').style.display    = 'none';
  document.getElementById('menu').style.display='flex';
  // 모드 목록 갱신
  const mr = document.getElementById('modeRow');
  mr.innerHTML = '';
  MODES.forEach(m => {
    const unlocked = isModeUnlocked(m);
    const el = document.createElement('div');
    el.className = 'mcard' + (m.id===selMode&&unlocked?' sel':'') + (unlocked?'':' locked');
    if (unlocked) {
      el.innerHTML = `<span class="ico">${m.ico}</span><span class="nm">${m.name}</span><span>${m.desc}</span>`;
      el.onclick = () => {
        selMode = m.id;
        mr.querySelectorAll('.mcard').forEach(c=>c.classList.remove('sel'));
        el.classList.add('sel');
      };
    } else {
      el.innerHTML = `<span class="ico">🔒</span><span class="nm">${m.name}</span><span class="trophy-req">🏆${m.req} 필요</span>`;
    }
    mr.appendChild(el);
  });

  // 브롤러 목록 갱신 (새로 해금된 브롤러 반영)
  const br = document.getElementById('brawlerRow');
  br.innerHTML = '';
  Object.entries(DEFS).forEach(([k,d]) => {
    const unlocked = isUnlocked(k);
    const req = BRAWLER_TROPHY_REQ[k];
    const el = document.createElement('div');
    el.className = 'card' + (k===selBrawler?' sel':'') + (unlocked?'':' locked');
    if (unlocked) {
      el.innerHTML = `<span class="ico">${d.ico}</span><span class="nm">${d.name}</span><span>${d.desc}</span><span class="my-trophy">🏆${trophyData.perBrawler&&trophyData.perBrawler[k]||0}</span>`;
      el.onclick = () => {
        selBrawler = k;
        br.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
        el.classList.add('sel');
        updateTrialIndicator();
      };
    } else {
      el.innerHTML = `<span class="ico">🔒</span><span class="nm">${d.name}</span><span class="trophy-req">🏆${req} 필요</span><span class="my-trophy">현재: ${trophyData.total||0}</span>`;
    }
    addTrialEvents(el, k, br);
    br.appendChild(el);
  });
  updateTrophyBar();
}

function buildMapRow() {
  const mapr = document.getElementById('mapRow');
  mapr.innerHTML = '';
  const keys = Object.keys(MAP_LAYOUTS).filter(k=>k.startsWith(selMode+'_'));
  keys.forEach(k => {
    const meta = MAP_META[k] || { name:k, ico:'🗺️' };
    const mapKey = k.replace(selMode+'_', '');
    const el = document.createElement('div');
    el.className = 'mcard' + (selMap===mapKey?' sel':'');
    el.innerHTML = `<span class="ico">${meta.ico}</span><span class="nm">${meta.name}</span>`;
    el.onclick = () => {
      selMap = mapKey;
      mapr.querySelectorAll('.mcard').forEach(c=>c.classList.remove('sel'));
      el.classList.add('sel');
    };
    el.oncontextmenu = (e) => {
      e.preventDefault();
      isTrialMode = true;
      selMap = mapKey;
      mapr.querySelectorAll('.mcard').forEach(c=>c.classList.remove('sel'));
      el.classList.add('sel');
      updateTrialIndicator();
    };
    let _lpt = null;
    el.addEventListener('touchstart', () => {
      _lpt = setTimeout(() => {
        isTrialMode = true;
        selMap = mapKey;
        mapr.querySelectorAll('.mcard').forEach(c=>c.classList.remove('sel'));
        el.classList.add('sel');
        updateTrialIndicator();
      }, 500);
    }, { passive: true });
    el.addEventListener('touchend',  () => clearTimeout(_lpt));
    el.addEventListener('touchmove', () => clearTimeout(_lpt));
    mapr.appendChild(el);
  });
}
